<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON BRICKOUT // Cyberpunk Brick Breaker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    color: #e0e0ff;
    overflow: hidden;
    user-select: none;
  }
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      linear-gradient(rgba(0,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }
  #game-container {
    position: relative;
    z-index: 1;
  }
  canvas {
    display: block;
    border-radius: 4px;
  }
  #ui-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
    display: flex;
    flex-direction: column;
  }
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .hud-left, .hud-center, .hud-right {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .hud-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
  .hud-label {
    color: rgba(0,255,255,0.4);
    font-size: 9px;
    letter-spacing: 0.15em;
  }
  .hud-value {
    color: #0ff;
    text-shadow: 0 0 8px rgba(0,255,255,0.6);
    font-weight: 700;
  }
  .hud-value.lives { color: #f44; text-shadow: 0 0 8px rgba(255,68,68,0.6); }
  .hud-value.level { color: #f0f; text-shadow: 0 0 8px rgba(255,0,255,0.6); }
  .hud-value.score { color: #ff0; text-shadow: 0 0 8px rgba(255,255,0,0.6); }
  #menu-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(5,5,15,0.92);
    z-index: 50;
    pointer-events: auto;
  }
  #menu-screen.hidden { display: none; }
  .menu-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 42px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: linear-gradient(180deg, #0ff 0%, #f0f 50%, #ff0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(0,255,255,0.5));
    margin-bottom: 8px;
  }
  .menu-subtitle {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    color: rgba(0,255,255,0.5);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .menu-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 14px 40px;
    background: linear-gradient(180deg, rgba(0,255,255,0.15), rgba(0,255,255,0.05));
    border: 1px solid #0ff;
    border-radius: 4px;
    color: #0ff;
    cursor: pointer;
    transition: all 0.2s ease;
    margin: 8px;
    pointer-events: auto;
  }
  .menu-btn:hover {
    background: linear-gradient(180deg, rgba(0,255,255,0.3), rgba(0,255,255,0.1));
    box-shadow: 0 0 20px rgba(0,255,255,0.3);
    transform: scale(1.04);
  }
  .menu-controls {
    margin-top: 36px;
    font-size: 11px;
    color: rgba(200,200,255,0.3);
    text-align: center;
    line-height: 2;
    letter-spacing: 0.1em;
  }
  .menu-controls kbd {
    background: rgba(0,255,255,0.1);
    border: 1px solid rgba(0,255,255,0.2);
    padding: 2px 8px;
    border-radius: 3px;
    color: #0ff;
    font-family: 'Share Tech Mono', monospace;
  }
  .powerup-bar {
    display: flex;
    gap: 6px;
    padding: 4px 16px 8px;
    align-items: center;
  }
  .active-powerup {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    padding: 3px 10px;
    border-radius: 3px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    animation: powerupPulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes powerupPulse {
    from { opacity: 0.7; }
    to { opacity: 1; }
  }


/* Cyberpunk arcade back link */

  top: 12px;

  padding: 8px 16px;
  color: rgba(0,255,255,0.6);
  text-decoration: none;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  letter-spacing: 0.15em;

  border-radius: 3px;
  background: rgba(0,0,20,0.7);
  backdrop-filter: blur(4px);

}
#arcade-back-link:hover {
  color: #0ff;
  border-color: #0ff;

</style>

<body>
<a href="arcade.html" id="arcade-back-link"><< BACK TO ARCADE</a>

<div id="game-container">
  <canvas id="gameCanvas"></canvas>
  
  <div id="ui-overlay">
    <div class="hud" id="hud">
      <div class="hud-left">
        <div><div class="hud-label">Score</div><div class="hud-value score" id="score-display">0</div></div>
        <div><div class="hud-label">Lives</div><div class="hud-value lives" id="lives-display">3</div></div>
      </div>
      <div class="hud-center">
        <div><div class="hud-label">Level</div><div class="hud-value level" id="level-display">1</div></div>
        <div><div class="hud-label">High Score</div><div class="hud-value score" id="highscore-display">0</div></div>
      </div>
      <div class="hud-right">
        <div class="powerup-bar" id="powerup-bar"></div>
      </div>
    </div>
  </div>

  <div id="menu-screen">
    <div class="menu-title">Neon Brickout</div>
    <div class="menu-subtitle">// Cyberpunk Brick Breaker //</div>
    <button class="menu-btn" id="btn-start">Start Game</button>
    <div class="menu-controls">
      <kbd>&larr;</kbd> <kbd>&rarr;</kbd> or Mouse to move paddle<br>
      <kbd>Space</kbd> to launch ball / fire lasers<br>
      <kbd>P</kbd> to pause &nbsp; <kbd>R</kbd> to restart
    </div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS & CONFIG
// ============================================================
const W = 640, H = 780;
const BRICK_ROWS = 10, BRICK_COLS = 12;
const BRICK_W = 48, BRICK_H = 18, BRICK_PAD = 3;
const BRICK_OFFSET_X = (W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;
const BRICK_OFFSET_Y = 50;
const PADDLE_W_BASE = 90, PADDLE_H = 12, PADDLE_Y = H - 50;
const BALL_R = 6;
const BALL_SPEED_BASE = 5.5;
const MAX_LIVES = 5;

const NEON_COLORS = ['#0ff','#f0f','#ff0','#0f0','#f44','#48f','#f80','#f0a'];
const BRICK_HIT_COLORS = {1: '#0ff', 2: '#f0f', 3: '#ff0'};

// Expand #abc to #aabbcc then append alpha suffix
function colorAlpha(hex, alpha) {
  if (hex.length === 4) { // #abc
    hex = '#' + hex[1]+hex[1] + hex[2]+hex[2] + hex[3]+hex[3];
  }
  return hex + alpha;
}

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;

const menuScreen = document.getElementById('menu-screen');
const scoreDisplay = document.getElementById('score-display');
const livesDisplay = document.getElementById('lives-display');
const levelDisplay = document.getElementById('level-display');
const highscoreDisplay = document.getElementById('highscore-display');
const powerupBar = document.getElementById('powerup-bar');

// ============================================================
// GAME STATE
// ============================================================
let state = {
  screen: 'menu', // menu, playing, paused, gameover, levelComplete
  score: 0,
  lives: MAX_LIVES,
  level: 1,
  highScore: parseInt(localStorage.getItem('neonBrickoutHigh') || '0'),
  shakeX: 0, shakeY: 0, shakeTime: 0,
};

// Paddle
let paddle = { x: W/2 - PADDLE_W_BASE/2, y: PADDLE_Y, w: PADDLE_W_BASE, h: PADDLE_H, color: '#0ff' };

// Balls - array for multi-ball support
let balls = [];

// Bricks
let bricks = [];

// Powerups
let powerups = [];

// Particles
let particles = [];

// Lasers
let lasers = [];

// Active effects
let activeEffects = {};
let laserActive = false;
let laserTimer = 0;
let paddleLockActive = false;
let gravityWellActive = false;
let gravityWellTimer = 0;

// Laser fire cooldown
let lastLaserFire = 0;

highscoreDisplay.textContent = state.highScore;

// ============================================================
// LEVEL DEFINITIONS
// Each cell: 0=empty, 1-3=hit points
// ============================================================
const LEVELS = [
  // Level 0 (index) = Level 1: "Neon Grid" - simple rows
  null,
  // Level 1
  () => {
    let b = [];
    for(let r=0;r<6;r++) for(let c=0;c<BRICK_COLS;c++) b.push({r,c,hp:1,maxHp:1,color:'#0ff'});
    return b;
  },
  // Level 2: "Cyber Walls" - blocks with gaps
  () => {
    let b = [];
    for(let r=0;r<4;r++) for(let c=0;c<BRICK_COLS;c++){
      if(c>=2 && c<=3 || c>=8 && c<=9) continue;
      b.push({r,c,hp:1,maxHp:1,color:'#f0f'});
    }
    for(let r=4;r<7;r++) for(let c=0;c<BRICK_COLS;c++){
      if(c===5||c===6) continue;
      b.push({r,c,hp:r===6?2:1,maxHp:2,color:BRICK_HIT_COLORS[r===6?2:1]});
    }
    return b;
  },
  // Level 3: "Matrix Maze" - diamond pattern
  () => {
    let b = [];
    const cx=BRICK_COLS/2, cy=4;
    for(let r=0;r<8;r++) for(let c=0;c<BRICK_COLS;c++){
      let dist = Math.abs(c-cx)+Math.abs(r-cy);
      if(dist<=5){
        let hp = dist<=2?3:dist<=4?2:1;
        b.push({r,c,hp,maxHp:hp,color:BRICK_HIT_COLORS[hp]});
      }
    }
    return b;
  },
  // Level 4: "Data Fortress" - layered walls
  () => {
    let b = [];
    for(let r=0;r<3;r++) for(let c=0;c<BRICK_COLS;c++)
      b.push({r,c,hp:1,maxHp:1,color:'#ff0'});
    for(let r=4;r<7;r++) for(let c=1;c<BRICK_COLS-1;c++){
      let hp = (r===5&&c>=4&&c<=7)?3:2;
      b.push({r,c,hp,maxHp:hp,color:BRICK_HIT_COLORS[Math.min(hp,3)]});
    }
    for(let r=7;r<9;r++) for(let c=0;c<BRICK_COLS;c++)
      b.push({r,c,hp:2,maxHp:2,color:'#f0f'});
    return b;
  },
  // Level 5: "Final Firewall" - dense complex
  () => {
    let b = [];
    for(let r=0;r<BRICK_ROWS;r++) for(let c=0;c<BRICK_COLS;c++){
      if(r===3 && c>=4 && c<=7) continue;
      let hp;
      if(r<2) hp=1;
      else if(r<5) hp=(c%3===0)?3:2;
      else hp=(r>7)?2:2;
      b.push({r,c,hp,maxHp:hp,color:BRICK_HIT_COLORS[Math.min(hp,3)]});
    }
    return b;
  },
];

// ============================================================
// PROCEDURAL LEVEL GENERATOR (Level 6+)
// ============================================================
function generateProceduralLevel(lvl) {
  let b = [];
  let rows = Math.min(6 + Math.floor((lvl-6)/2), BRICK_ROWS);
  let density = Math.min(0.5 + (lvl-6)*0.03, 0.9);
  
  for(let r=0; r<rows; r++) {
    for(let c=0; c<BRICK_COLS; c++) {
      if(Math.random() > density) continue;
      let maxHp = 1;
      let rand = Math.random();
      if(rand < 0.05 * (lvl-5)) maxHp = 3;
      else if(rand < 0.15 * (lvl-5)) maxHp = 2;
      
      // Create some patterns occasionally
      if(lvl > 7 && r%2===0 && c>0 && c<BRICK_COLS-1 && Math.random()<0.3) {
        // skip alternating for pattern
        if(c%2===0) continue;
      }
      
      b.push({r,c,hp:maxHp,maxHp:maxHp,color:BRICK_HIT_COLORS[maxHp]});
    }
  }
  return b;
}

// ============================================================
// POWERUP DEFINITIONS
// ============================================================
const POWERUP_TYPES = [
  { id:'multiball',  label:'⚡ TRIPLE PULSE',    color:'#0ff', duration:0 },
  { id:'expand',     label:'🔧 NEON EXPAND',      color:'#f0f', duration:18000 },
  { id:'fireball',   label:'🔥 PLASMA SHOT',      color:'#f44', duration:15000 },
  { id:'slowmo',     label:'⏱️ TIME DILATION',    color:'#ff0', duration:12000 },
  { id:'laser',      label:'💎 RAIL GUN',         color:'#48f', duration:10000 },
  { id:'life',       label:'❤️ SOUL SHARD',        color:'#f4a', duration:0 },
  { id:'gravity',    label:'🌀 GRAVITY WELL',     color:'#f0a', duration:8000 },
  { id:'lock',       label:'🔒 NEURAL LINK',      color:'#0f0', duration:10000 },
];

// ============================================================
// AUDIO SYNTHESIS (Web Audio API)
// ============================================================
let audioCtx = null;
function initAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(freq, dur, type='square', vol=0.08) {
  if(!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*0.5, audioCtx.currentTime+dur);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function sfxBrickHit() { playSound(600+Math.random()*400, 0.1, 'square', 0.05); }
function sfxWallHit() { playSound(300, 0.05, 'triangle', 0.03); }
function sfxPaddleHit() { playSound(200+Math.random()*100, 0.12, 'square', 0.06); }
function sfxPowerup() { playSound(800, 0.3, 'sine', 0.07); playSound(1200, 0.2, 'sine', 0.05); }
function sfxLifeLost() { playSound(150, 0.4, 'sawtooth', 0.08); }
function sfxLevelComplete() { 
    [400,500,600,700,800].forEach((f,i) => setTimeout(()=>playSound(f,0.15,'sine',0.06), i*80));
}
function sfxLaser() { playSound(1200, 0.08, 'sawtooth', 0.03); }

// ============================================================
// PARTICLES SYSTEM
// ============================================================
function spawnParticles(x,y,color,count=12) {
  for(let i=0;i<count;i++){
    let angle = Math.random()*Math.PI*2;
    let speed = 1+Math.random()*4;
    particles.push({
      x,y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 30+Math.random()*30,
      maxLife: 60,
      size: 1.5+Math.random()*2.5,
      color
    });
  }
}

function updateParticles() {
  for(let i=particles.length-1;i>=0;i--){
    let p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.vx *= 0.98;
    p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
}

function drawParticles() {
  for(let p of particles){
    let alpha = Math.min(1, p.life/p.maxLife)*0.8;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
    ctx.restore();
  }
}

// ============================================================
// SCREEN SHAKE
// ============================================================
function triggerShake(intensity=3, duration=8) {
  state.shakeTime = duration;
  state.shakeX = (Math.random()-0.5)*intensity;
  state.shakeY = (Math.random()-0.5)*intensity;
}

// ============================================================
// LEVEL LOADING
// ============================================================
function loadLevel(lvl) {
  state.level = lvl;
  levelDisplay.textContent = lvl;
  
  if(lvl < LEVELS.length && LEVELS[lvl]) {
    bricks = LEVELS[lvl]();
  } else {
    bricks = generateProceduralLevel(lvl);
  }
  
  // Reset balls
  resetBall();
  powerups = [];
  lasers = [];
  activeEffects = {};
  laserActive = false;
  paddleLockActive = false;
  gravityWellActive = false;
  paddle.w = PADDLE_W_BASE;
  paddle.x = W/2 - paddle.w/2;
  
  updatePowerupBar();
}

function resetBall() {
  balls = [{
    x: W/2, y: PADDLE_Y - 20,
    vx: 0, vy: 0,
    launched: false,
    speed: BALL_SPEED_BASE + (state.level-1)*0.3,
    fireBall: false,
    radius: BALL_R
  }];
}

// ============================================================
// POWERUP SYSTEM
// ============================================================
function spawnPowerup(brick) {
  // 20% chance per brick destroyed (only on final hit handled in brickHit)
  let px = BRICK_OFFSET_X + brick.c*(BRICK_W+BRICK_PAD) + BRICK_W/2;
  let py = BRICK_OFFSET_Y + brick.r*(BRICK_H+BRICK_PAD) + BRICK_H/2;
  
  // Weighted random - some are rarer
  let roll = Math.random();
  let typeIdx;
  if(roll < 0.25) typeIdx = 0;     // multiball - common
  else if(roll < 0.45) typeIdx = 1; // expand
  else if(roll < 0.60) typeIdx = 2; // fireball
  else if(roll < 0.72) typeIdx = 3; // slowmo
  else if(roll < 0.82) typeIdx = 4; // laser
  else if(roll < 0.90) typeIdx = 5; // life - rare
  else if(roll < 0.96) typeIdx = 6; // gravity
  else typeIdx = 7;                  // lock
  
  let def = POWERUP_TYPES[typeIdx];
  powerups.push({ x:px, y:py, vy:2.5, ...def, w:30, h:14 });
}

function applyPowerup(pu) {
  sfxPowerup();
  
  switch(pu.id) {
    case 'multiball': {
      let newBalls = [];
      for(let b of balls) {
        if(b.launched) {
          let angle1 = Math.atan2(b.vy, b.vx) - 0.4;
          let angle2 = Math.atan2(b.vy, b.vx) + 0.4;
          newBalls.push({
            x:b.x, y:b.y,
            vx: Math.cos(angle1)*b.speed, vy: Math.sin(angle1)*b.speed,
            launched:true, speed:b.speed, fireBall:b.fireBall, radius:b.radius
          });
          newBalls.push({
            x:b.x, y:b.y,
            vx: Math.cos(angle2)*b.speed, vy: Math.sin(angle2)*b.speed,
            launched:true, speed:b.speed, fireBall:b.fireBall, radius:b.radius
          });
        }
      }
      balls.push(...newBalls);
      spawnParticles(pu.x, pu.y, '#0ff', 8);
      break;
    }
    case 'expand':
      paddle.w = PADDLE_W_BASE * 1.6;
      setEffect('expand', pu.duration);
      break;
    case 'fireball':
      for(let b of balls) b.fireBall = true;
      setEffect('fireball', pu.duration);
      break;
    case 'slowmo':
      for(let b of balls) b.speed *= 0.65;
      setEffect('slowmo', pu.duration);
      break;
    case 'laser':
      laserActive = true;
      setEffect('laser', pu.duration);
      break;
    case 'life':
      state.lives = Math.min(state.lives+1, MAX_LIVES);
      livesDisplay.textContent = state.lives;
      spawnParticles(pu.x, pu.y, '#f4a', 10);
      break;
    case 'gravity':
      gravityWellActive = true;
      gravityWellTimer = performance.now();
      setEffect('gravity', pu.duration);
      break;
    case 'lock':
      paddleLockActive = true;
      setEffect('lock', pu.duration);
      break;
  }
  
  updatePowerupBar();
}

function setEffect(id, duration) {
  activeEffects[id] = performance.now() + duration;
}

function checkEffects() {
  let now = performance.now();
  for(let id in activeEffects) {
    if(now > activeEffects[id]) {
      delete activeEffects[id];
      // Reverse effects
      switch(id) {
        case 'expand': paddle.w = PADDLE_W_BASE; break;
        case 'fireball': balls.forEach(b=>b.fireBall=false); break;
        case 'slowmo': 
          balls.forEach(b=>b.speed=BALL_SPEED_BASE+(state.level-1)*0.3); 
          break;
        case 'laser': laserActive = false; break;
        case 'gravity': gravityWellActive = false; break;
        case 'lock': paddleLockActive = false; break;
      }
      updatePowerupBar();
    }
  }
}

function updatePowerupBar() {
  powerupBar.innerHTML = '';
  for(let id in activeEffects) {
    let def = POWERUP_TYPES.find(p=>p.id===id);
    if(def) {
      let remaining = Math.max(0, Math.ceil((activeEffects[id]-performance.now())/1000));
      let el = document.createElement('div');
      el.className = 'active-powerup';
      el.style.color = def.color;
      el.style.border = `1px solid ${def.color}`;
      el.style.background = colorAlpha(def.color, '22');
      el.textContent = `${def.label} ${remaining}s`;
      powerupBar.appendChild(el);
    }
  }
}

// ============================================================
// INPUT HANDLING
// ============================================================
let keys = {};
let mouseX = W/2;
let useMouseControl = false;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  useMouseControl = false;
  
  if(e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
  
  if(state.screen === 'playing') {
    // Launch ball(s)
    balls.forEach(b => {
      if(!b.launched) {
        b.launched = true;
        let angle = -Math.PI/2 + (Math.random()-0.5)*0.8;
        b.vx = Math.cos(angle) * b.speed;
        b.vy = Math.sin(angle) * b.speed;
      }
    });
    
    // Fire laser
    if(e.key === ' ' && laserActive) {
      let now = performance.now();
      if(now - lastLaserFire > 150) {
        lasers.push({ x: paddle.x+paddle.w/2, y: paddle.y-4, vy: -9 });
        sfxLaser();
        lastLaserFire = now;
      }
    }
  }
  
  if(e.key === 'p' || e.key === 'P') {
    if(state.screen === 'playing') state.screen = 'paused';
    else if(state.screen === 'paused') state.screen = 'playing';
  }
  
  if(e.key === 'r' || e.key === 'R') {
    if(state.screen === 'gameover') startGame();
  }
});

document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('mousemove', e => {
  let rect = canvas.getBoundingClientRect();
  let scaleX = W / rect.width;
  mouseX = (e.clientX - rect.left) * scaleX;
  useMouseControl = true;
});

canvas.addEventListener('click', () => {
  if(state.screen === 'playing') {
    balls.forEach(b => {
      if(!b.launched) {
        b.launched = true;
        let angle = -Math.PI/2 + (Math.random()-0.5)*0.8;
        b.vx = Math.cos(angle) * b.speed;
        b.vy = Math.sin(angle) * b.speed;
      }
    });
  }
});

document.getElementById('btn-start').addEventListener('click', () => {
  initAudio();
  startGame();
});

function startGame() {
  state.score = 0;
  state.lives = MAX_LIVES;
  state.level = 1;
  scoreDisplay.textContent = '0';
  livesDisplay.textContent = state.lives;
  menuScreen.classList.add('hidden');
  state.screen = 'playing';
  loadLevel(1);
}

// ============================================================
// COLLISION DETECTION
// ============================================================
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  let closestX = Math.max(rx, Math.min(cx, rx+rw));
  let closestY = Math.max(ry, Math.min(cy, ry+rh));
  let dx = cx - closestX;
  let dy = cy - closestY;
  return (dx*dx + dy*dy) < (cr*cr);
}

function brickHit(ball, brickIdx) {
  let brick = bricks[brickIdx];
  
  if(!ball.fireBall) {
    brick.hp--;
  }
  
  sfxBrickHit();
  
  if(brick.hp <= 0) {
    // Brick destroyed - calculate score based on maxHp
    let pts = brick.maxHp * 10 * state.level;
    state.score += pts;
    scoreDisplay.textContent = state.score;
    
    spawnParticles(
      BRICK_OFFSET_X + brick.c*(BRICK_W+BRICK_PAD) + BRICK_W/2,
      BRICK_OFFSET_Y + brick.r*(BRICK_H+BRICK_PAD) + BRICK_H/2,
      brick.color || '#0ff', 15
    );
    triggerShake(2, 5);
    
    // Chance to drop powerup on final destroy
    if(Math.random() < 0.18) {
      spawnPowerup(brick);
    }
    
    bricks.splice(brickIdx, 1);
  } else {
    // Hit but not destroyed
    brick.color = BRICK_HIT_COLORS[brick.hp] || '#0ff';
    spawnParticles(
      BRICK_OFFSET_X + brick.c*(BRICK_W+BRICK_PAD) + BRICK_W/2,
      BRICK_OFFSET_Y + brick.r*(BRICK_H+BRICK_PAD) + BRICK_H/2,
      brick.color, 4
    );
  }
  
  // Check level complete
  if(bricks.length === 0 && state.screen === 'playing') {
    levelComplete();
  }
}

function levelComplete() {
  sfxLevelComplete();
  if(state.score > state.highScore) {
    state.highScore = state.score;
    localStorage.setItem('neonBrickoutHigh', state.highScore.toString());
    highscoreDisplay.textContent = state.highScore;
  }
  
  // Bonus score for remaining lives
  state.score += state.lives * 100;
  scoreDisplay.textContent = state.score;
  
  state.screen = 'levelComplete';
  setTimeout(() => {
    state.screen = 'playing';
    loadLevel(state.level + 1);
  }, 2000);
}

// ============================================================
// GAME UPDATE
// ============================================================
function update() {
  if(state.screen !== 'playing') return;
  
  checkEffects();
  
  // Paddle movement
  if(useMouseControl) {
    paddle.x = mouseX - paddle.w/2;
  } else {
    let speed = 7;
    if(keys['ArrowLeft'] || keys['a']) paddle.x -= speed;
    if(keys['ArrowRight'] || keys['d']) paddle.x += speed;
  }
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
  
  // Update balls
  for(let bi = balls.length-1; bi >= 0; bi--) {
    let b = balls[bi];
    
    if(!b.launched) {
      // Stick to paddle
      b.x = paddle.x + paddle.w/2;
      b.y = paddle.y - b.radius - 2;
      
      if(paddleLockActive && keys[' ']) {
        b.launched = true;
        let angle = -Math.PI/2 + (Math.random()-0.5)*0.8;
        b.vx = Math.cos(angle) * b.speed;
        b.vy = Math.sin(angle) * b.speed;
      }
      continue;
    }
    
    // Gravity well effect - attract balls toward paddle center
    if(gravityWellActive) {
      let pcx = paddle.x + paddle.w/2;
      let pcy = paddle.y;
      let dx = pcx - b.x;
      let dy = pcy - b.y;
      let dist = Math.sqrt(dx*dx+dy*dy);
      if(dist > 0 && dist < 200) {
        let force = 0.15 * (1 - dist/200);
        b.vx += (dx/dist) * force;
        b.vy += (dy/dist) * force;
      }
    }
    
    // Move ball
    b.x += b.vx;
    b.y += b.vy;
    
    // Wall collisions
    if(b.x - b.radius <= 0) {
      b.x = b.radius; b.vx = Math.abs(b.vx); sfxWallHit();
    }
    if(b.x + b.radius >= W) {
      b.x = W - b.radius; b.vx = -Math.abs(b.vx); sfxWallHit();
    }
    if(b.y - b.radius <= 0) {
      b.y = b.radius; b.vy = Math.abs(b.vy); sfxWallHit();
    }
    
    // Bottom - lose ball
    if(b.y + b.radius > H) {
      balls.splice(bi, 1);
      continue;
    }
    
    // Paddle collision
    if(b.vy > 0 && circleRect(b.x, b.y, b.radius, paddle.x, paddle.y, paddle.w, paddle.h)) {
      // Calculate angle based on where ball hits the paddle
      let hitPos = (b.x - paddle.x) / paddle.w; // 0=left edge, 1=right edge
      let relative = (hitPos - 0.5) * 2; // -1 (left edge) to +1 (right edge)
      // Clamp to prevent impossible angles, but allow very sharp deflections at edges
      // Near center: straight up (~-90°), near edges: nearly horizontal (~±10° or ±170°)
      let maxAngle = Math.PI * 0.46; // ~83° from vertical
      let angle = -Math.PI/2 + relative * maxAngle;
      
      b.vx = Math.cos(angle) * b.speed;
      b.vy = Math.sin(angle) * b.speed;
      b.y = paddle.y - b.radius - 1;
      
      sfxPaddleHit();
      spawnParticles(b.x, b.y, '#0ff', 4);
      
      // Neural link - re-catch ball
      if(paddleLockActive) {
        b.launched = false;
        b.vx = 0; b.vy = 0;
      }
    }
    
    // Brick collisions
    for(let bri = bricks.length-1; bri >= 0; bri--) {
      let brick = bricks[bri];
      let bx = BRICK_OFFSET_X + brick.c*(BRICK_W+BRICK_PAD);
      let by = BRICK_OFFSET_Y + brick.r*(BRICK_H+BRICK_PAD);
      
      if(circleRect(b.x, b.y, b.radius, bx, by, BRICK_W, BRICK_H)) {
        // Determine collision face
        let overlapLeft = (b.x+b.radius) - bx;
        let overlapRight = (bx+BRICK_W) - (b.x-b.radius);
        let overlapTop = (b.y+b.radius) - by;
        let overlapBottom = (by+BRICK_H) - (b.y-b.radius);
        
        let minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
        
        if(minOverlap === overlapTop || minOverlap === overlapBottom) b.vy *= -1;
        else b.vx *= -1;
        
        brickHit(b, bri);
        break; // One brick per frame for ball
      }
    }
  }
  
  // Check if all balls lost
  if(balls.length === 0) {
    state.lives--;
    livesDisplay.textContent = state.lives;
    sfxLifeLost();
    
    if(state.lives <= 0) {
      gameOver();
    } else {
      resetBall();
    }
  }
  
  // Update lasers
  for(let i=lasers.length-1;i>=0;i--){
    let l = lasers[i];
    l.y += l.vy;
    if(l.y < 0) { lasers.splice(i,1); continue; }
    
    // Laser-brick collision
    for(let bri=bricks.length-1;bri>=0;bri--){
      let brick = bricks[bri];
      let bx = BRICK_OFFSET_X + brick.c*(BRICK_W+BRICK_PAD);
      let by = BRICK_OFFSET_Y + brick.r*(BRICK_H+BRICK_PAD);
      
      if(l.x >= bx && l.x <= bx+BRICK_W && l.y >= by && l.y <= by+BRICK_H) {
        lasers.splice(i,1);
        brickHit(null, bri);
        break;
      }
    }
  }
  
  // Update powerups
  for(let i=powerups.length-1;i>=0;i--){
    let pu = powerups[i];
    pu.y += pu.vy;
    
    // Check paddle catch
    if(pu.y+pu.h >= paddle.y && pu.y <= paddle.y+paddle.h &&
       pu.x+pu.w/2 >= paddle.x && pu.x-pu.w/2 <= paddle.x+paddle.w) {
      applyPowerup(pu);
      powerups.splice(i,1);
      continue;
    }
    
    if(pu.y > H) { powerups.splice(i,1); }
  }
  
  updateParticles();
  
  // Screen shake decay
  if(state.shakeTime > 0) {
    state.shakeTime--;
    state.shakeX = (Math.random()-0.5)*state.shakeTime*0.4;
    state.shakeY = (Math.random()-0.5)*state.shakeTime*0.4;
  } else {
    state.shakeX = 0; state.shakeY = 0;
  }
}

function gameOver() {
  state.screen = 'gameover';
  if(state.score > state.highScore) {
    state.highScore = state.score;
    localStorage.setItem('neonBrickoutHigh', state.highScore.toString());
    highscoreDisplay.textContent = state.highScore;
  }
  
  menuScreen.classList.remove('hidden');
  menuScreen.querySelector('.menu-title').textContent = 'SYSTEM CRASH';
  menuScreen.querySelector('.menu-subtitle').textContent = `// FINAL SCORE: ${state.score} //`;
  document.getElementById('btn-start').textContent = 'REBOOT (Press R)';
}

// ============================================================
// RENDERING
// ============================================================
function draw() {
  ctx.save();
  ctx.translate(state.shakeX, state.shakeY);
  
  // Clear with slight trail effect
  ctx.fillStyle = 'rgba(10, 10, 18, 0.85)';
  ctx.fillRect(-10,-10,W+20,H+20);
  
  if(state.screen === 'menu') {
    ctx.restore();
    return;
  }
  
  // Draw bricks
  for(let brick of bricks) {
    let x = BRICK_OFFSET_X + brick.c*(BRICK_W+BRICK_PAD);
    let y = BRICK_OFFSET_Y + brick.r*(BRICK_H+BRICK_PAD);
    
    let color = brick.color || '#0ff';
    
    ctx.save();
    ctx.fillStyle = colorAlpha(color, '33'); // semi-transparent fill
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = color;
    ctx.shadowBlur = 6;
    
    ctx.fillRect(x,y,BRICK_W,BRICK_H);
    ctx.strokeRect(x,y,BRICK_W,BRICK_H);
    
    // Hit indicator for multi-hit bricks
    if(brick.maxHp > 1) {
      ctx.fillStyle = color;
      ctx.shadowBlur = 0;
      ctx.font = '9px "Share Tech Mono"';
      ctx.textAlign = 'center';
      ctx.fillText(brick.hp, x+BRICK_W/2, y+BRICK_H/2+3);
    }
    
    // Glow line at top
    ctx.fillStyle = colorAlpha(color, '88');
    ctx.fillRect(x+2,y,BRICK_W-4,2);
    
    ctx.restore();
  }
  
  // Draw powerups
  for(let pu of powerups) {
    ctx.save();
    ctx.fillStyle = colorAlpha(pu.color, '44');
    ctx.strokeStyle = pu.color;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = pu.color;
    ctx.shadowBlur = 8;
    
    let px = pu.x - pu.w/2;
    ctx.beginPath();
    ctx.roundRect(px, pu.y, pu.w, pu.h, 4);
    ctx.fill();
    ctx.stroke();
    
    ctx.fillStyle = pu.color;
    ctx.shadowBlur = 0;
    ctx.font = '8px "Share Tech Mono"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    // Icon for powerup
    let icon = '';
    switch(pu.id) {
      case 'multiball': icon='⚡'; break;
      case 'expand': icon='↔'; break;
      case 'fireball': icon='🔥'; break;
      case 'slowmo': icon='◷'; break;
      case 'laser': icon='‖'; break;
      case 'life': icon='♥'; break;
      case 'gravity': icon='◎'; break;
      case 'lock': icon='⊕'; break;
    }
    ctx.font = '9px sans-serif';
    ctx.fillText(icon, pu.x, pu.y + pu.h/2);
    
    ctx.restore();
  }
  
  // Draw paddle
  ctx.save();
  let paddleColor = paddle.color;
  if(laserActive) paddleColor = '#48f';
  if(paddleLockActive) paddleColor = '#0f0';
  
  // Paddle glow
  ctx.shadowColor = paddleColor;
  ctx.shadowBlur = 15;
  ctx.fillStyle = colorAlpha(paddleColor, '66');
  ctx.beginPath();
  ctx.roundRect(paddle.x-2, paddle.y-2, paddle.w+4, paddle.h+4, 6);
  ctx.fill();
  
  // Paddle body
  let grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x+paddle.w, paddle.y);
  grad.addColorStop(0, colorAlpha(paddleColor, 'cc'));
  grad.addColorStop(0.5, '#fff');
  grad.addColorStop(1, colorAlpha(paddleColor, 'cc'));
  ctx.fillStyle = grad;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 4);
  ctx.fill();
  
  // Laser indicators on paddle
  if(laserActive) {
    ctx.fillStyle = '#48f';
    ctx.shadowColor = '#48f';
    ctx.shadowBlur = 6;
    ctx.fillRect(paddle.x+4, paddle.y-6, 3, 6);
    ctx.fillRect(paddle.x+paddle.w-7, paddle.y-6, 3, 6);
  }
  
  ctx.restore();
  
  // Draw lasers
  for(let l of lasers) {
    ctx.save();
    ctx.strokeStyle = '#48f';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#48f';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);
    ctx.lineTo(l.x, l.y+20);
    ctx.stroke();
    ctx.restore();
  }
  
  // Draw balls with trail
  for(let b of balls) {
    ctx.save();
    
    let ballColor = b.fireBall ? '#f44' : '#fff';
    let trailColor = b.fireBall ? '#f80' : paddleColor;
    
    // Ball trail
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = trailColor;
    ctx.beginPath();
    ctx.arc(b.x - b.vx*1.5, b.y - b.vy*1.5, b.radius*0.7, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.arc(b.x - b.vx*3, b.y - b.vy*3, b.radius*0.5, 0, Math.PI*2);
    ctx.fill();
    
    // Main ball
    ctx.globalAlpha = 1;
    ctx.fillStyle = ballColor;
    ctx.shadowColor = trailColor;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2);
    ctx.fill();
    
    // Inner glow
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(b.x-b.radius*0.25, b.y-b.radius*0.25, b.radius*0.35, 0, Math.PI*2);
    ctx.fill();
    
    ctx.restore();
  }
  
  // Draw particles
  drawParticles();
  
  // Level complete overlay
  if(state.screen === 'levelComplete') {
    ctx.save();
    ctx.fillStyle = 'rgba(5,5,15,0.7)';
    ctx.fillRect(0,0,W,H);
    
    ctx.font = '900 36px Orbitron';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#0ff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 20;
    ctx.fillText(`LEVEL ${state.level} COMPLETE`, W/2, H/2-20);
    
    ctx.font = '14px "Share Tech Mono"';
    ctx.fillStyle = '#ff0';
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 10;
    ctx.fillText(`+${state.lives * 100} LIFE BONUS`, W/2, H/2+25);
    
    ctx.restore();
  }
  
  // Paused overlay
  if(state.screen === 'paused') {
    ctx.save();
    ctx.fillStyle = 'rgba(5,5,15,0.7)';
    ctx.fillRect(0,0,W,H);
    
    ctx.font = '900 42px Orbitron';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#f0f';
    ctx.shadowColor = '#f0f';
    ctx.shadowBlur = 20;
    ctx.fillText('PAUSED', W/2, H/2);
    
    ctx.restore();
  }
  
  ctx.restore();
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  let dt = timestamp - lastTime;
  lastTime = timestamp;
  
  // Cap dt to prevent huge jumps
  if(dt > 50) dt = 50;
  
  update();
  draw();
  
  requestAnimationFrame(gameLoop);
}

// ============================================================
// INIT
// ============================================================
function init() {
  // Responsive canvas sizing
  function resizeCanvas() {
    let maxW = window.innerWidth - 20;
    let maxH = window.innerHeight - 20;
    let scale = Math.min(maxW/W, maxH/H);
    canvas.style.width = (W*scale) + 'px';
    canvas.style.height = (H*scale) + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  
  requestAnimationFrame(gameLoop);
}

init();
</script>
