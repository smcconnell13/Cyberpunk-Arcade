// Platform class
class Platform {
    constructor(x, y, width, height) {
        this.x = x; this.y = y;
        this.width = width; this.height = height;
    }
    draw() {
        // Neon outline with glow
        ctx.shadowColor = CYAN;
        ctx.shadowBlur = 8;
        ctx.strokeStyle = CYAN;
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.width, this.height);
        
        // Fill with subtle pattern
        ctx.fillStyle = '#001a33';
        ctx.fillRect(this.x + 1, this.y + 1, this.width - 2, this.height - 2);
        
        // Top highlight line
        ctx.fillStyle = CYAN;
        ctx.fillRect(this.x, this.y, this.width, 2);
        
        ctx.shadowBlur = 0;
    }
}

// Honey Hive class
class HoneyHive {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.width = 32; this.height = 32;
        this.collected = false;
        this.pulsePhase = Math.random() * Math.PI * 2;
    }
    draw() {
        if(this.collected) return;
        this.pulsePhase += 0.05;
        const pulse = 0.7 + 0.3 * Math.sin(this.pulsePhase);
        
        ctx.save();
        ctx.shadowColor = AMBER;
        ctx.shadowBlur = 15 * pulse;
        
        // Draw hexagonal hive
        const cx = this.x + 16, cy = this.y + 16;
        const r = 14;
        ctx.beginPath();
        for(let i = 0; i < 6; i++) {
            const angle = Math.PI / 3 * i - Math.PI / 6;
            const px = cx + r * Math.cos(angle);
            const py = cy + r * Math.sin(angle);
            if(i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = AMBER;
        ctx.fill();
        ctx.strokeStyle = '#ffdd44';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Inner hexagon for detail
        const r2 = 8;
        ctx.beginPath();
        for(let i = 0; i < 6; i++) {
            const angle = Math.PI / 3 * i - Math.PI / 6;
            const px = cx + r2 * Math.cos(angle);
            const py = cy + r2 * Math.sin(angle);
            if(i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = '#ffdd44';
        ctx.fill();
        
        ctx.restore();
    }
}

// Bee enemy class
class Bee {
    constructor(x, y, patrolLeft, patrolRight) {
        this.startX = x; this.startY = y;
        this.x = x; this.y = y;
        this.width = 30; this.height = 24;
        this.patrolLeft = patrolLeft;
        this.patrolRight = patrolRight;
        this.speed = 2 + currentLevel * 0.3;
        this.direction = 1;
        this.wingFrame = 0;
        this.wingTimer = 0;
    }
    update() {
        this.x += this.speed * this.direction;
        this.wingTimer += 0.3;
        
        if(this.x <= this.patrolLeft || this.x >= this.patrolRight) {
            this.direction *= -1;
        }
    }
    draw() {
        ctx.save();
        const cx = this.x + 15, cy = this.y + 12;
        
        // Body (red neon)
        ctx.shadowColor = RED;
        ctx.shadowBlur = 10;
        ctx.fillStyle = RED;
        
        // Thorax
        ctx.beginPath();
        ctx.ellipse(cx, cy, 8, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Abdomen (striped)
        ctx.fillStyle = '#220000';
        ctx.beginPath();
        ctx.ellipse(cx + this.direction * 7, cy, 7, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Stripe
        ctx.fillStyle = RED;
        ctx.fillRect(cx + this.direction * 5, cy - 4, 3, 8);
        
        // Wings (cyan, animated)
        const wingOffset = Math.sin(this.wingTimer) * 6;
        ctx.shadowColor = CYAN;
        ctx.fillStyle = '#00ffff88';
        ctx.beginPath();
        ctx.ellipse(cx - 2, cy - 10 + wingOffset, 6, 3, -0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx - 2, cy - 10 - wingOffset, 6, 3, 0.3, 0, Math.PI * 2);
        ctx.fill();
        
        // Eye
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.fillRect(cx + this.direction * 5, cy - 4, 3, 3);
        
        ctx.restore();
    }
}

// Particle class
class Particle {
    constructor(x, y, color, type) {
        this.x = x; this.y = y;
        this.color = color;
        this.type = type || 'spark';
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8 - 2;
        this.life = 1.0;
        this.decay = 0.02 + Math.random() * 0.03;
        this.size = 2 + Math.random() * 4;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.15;
        this.life -= this.decay;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 6;
        ctx.fillStyle = this.color;
        
        if(this.type === 'spark') {
            ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
        } else if(this.type === 'glow') {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }
}

// Draw the bear character
function drawBear() {
    if(bear.dead) return;
    
    // Invincibility flash
    if(bear.invincible > 0 && Math.floor(frameCount / 4) % 2 === 0) return;
    
    ctx.save();
    const bx = bear.x, by = bear.y;
    const f = bear.facing;
    
    ctx.shadowColor = GREEN;
    ctx.shadowBlur = 12;
    ctx.fillStyle = GREEN;
    
    // Body
    ctx.fillRect(bx + 8, by + 14, 20, 16);
    
    // Head
    ctx.fillRect(bx + 10, by, 16, 16);
    
    // Ears
    ctx.fillRect(bx + 10, by - 4, 5, 5);
    ctx.fillRect(bx + 21, by - 4, 5, 5);
    
    // Nose (dark)
    ctx.fillStyle = '#003311';
    ctx.fillRect(bx + (f === 1 ? 22 : 10), by + 6, 4, 3);
    
    // Eye (dark with white dot)
    ctx.fillStyle = '#003311';
    ctx.fillRect(bx + (f === 1 ? 18 : 12), by + 4, 4, 4);
    ctx.fillStyle = GREEN;
    ctx.fillRect(bx + (f === 1 ? 20 : 12), by + 5, 2, 2);
    
    // Mouth/happy line
    ctx.fillStyle = '#003311';
    ctx.fillRect(bx + (f === 1 ? 18 : 12), by + 10, 6, 1);
    
    // Arms
    ctx.fillStyle = GREEN;
    if(bear.onGround && Math.abs(bear.vx) > 0.5) {
        const armSwing = Math.sin(bear.walkTimer * 0.3) * 4;
        ctx.fillRect(bx + 4, by + 16 + armSwing, 6, 10);
        ctx.fillRect(bx + 26, by + 16 - armSwing, 6, 10);
    } else if(!bear.onGround) {
        // Jump pose - arms up
        ctx.fillRect(bx + 4, by + 10, 6, 10);
        ctx.fillRect(bx + 26, by + 10, 6, 10);
    } else {
        ctx.fillRect(bx + 4, by + 18, 6, 10);
        ctx.fillRect(bx + 26, by + 18, 6, 10);
    }
    
    // Legs
    if(bear.onGround && Math.abs(bear.vx) > 0.5) {
        const legSwing = Math.sin(bear.walkTimer * 0.3) * 5;
        ctx.fillRect(bx + 8, by + 28, 7, 12 + legSwing - 5);
        ctx.fillRect(bx + 21, by + 28, 7, 12 - legSwing + 5);
    } else if(!bear.onGround) {
        // Jump pose - legs spread
        ctx.fillRect(bx + 4, by + 28, 8, 8);
        ctx.fillRect(bx + 24, by + 26, 8, 10);
    } else {
        ctx.fillRect(bx + 8, by + 28, 7, 12);
        ctx.fillRect(bx + 21, by + 28, 7, 12);
    }
    
    // Tail (tiny)
    const tailWag = Math.sin(frameCount * 0.1) * 2;
    ctx.fillRect(bx + (f === 1 ? 4 : 28), by + 22 + tailWag, 6, 5);
    
    ctx.restore();
}

// Draw background grid
function drawBackground() {
    // Dark background
    ctx.fillStyle = DARK_BG;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Grid effect
    ctx.strokeStyle = GRID_COLOR;
    ctx.lineWidth = 1;
    
    const scrollX = (frameCount * 0.2) % TILE;
    
    for(let x = -scrollX; x < canvas.width; x += TILE) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for(let y = 0; y < canvas.height; y += TILE) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
    
    // Scanline effect (subtle)
    ctx.fillStyle = '#ffffff06';
    for(let y = 0; y < canvas.height; y += 4) {
        ctx.fillRect(0, y, canvas.width, 1);
    }
}

// Draw HUD
function drawHUD() {
    ctx.save();
    
    // Top bar background
    ctx.fillStyle = '#000000cc';

    ctx.fillStyle = GREEN;
    ctx.fillRect(0, 40, canvas.width, 1);

    ctx.fillStyle = GREEN;
    ctx.font = '16px Courier New';
    ctx.fillText(`SCORE: ${score.toString().padStart(6, '0')}`, 20, 26);
    
    // Level
    ctx.fillStyle = CYAN;
    ctx.shadowColor = CYAN;
    ctx.fillText(`LEVEL: ${currentLevel + 1}/${levels.length}`, 250, 26);
    
    // Lives (bear icons)
    ctx.fillStyle = GREEN;
    ctx.shadowColor = GREEN;
    let livesText = 'LIVES: ';
    for(let i = 0; i < lives; i++) {
        livesText += '[B] ';
    }
    ctx.fillText(livesText, 450, 26);
    
    // Hives remaining
    const levelData = levels[currentLevel];
    if(levelData) {
        const remaining = levelData.hives.filter(h => !h.collected).length;
        const total = levelData.hives.length;
        ctx.fillStyle = AMBER;
        ctx.shadowColor = AMBER;
        ctx.fillText(`HONEY: ${remaining}/${total}`, 680, 26);
    }
    
    ctx.restore();
}

}

// Spawn particles
function spawnParticles(x, y, color, count, type) {
    for(let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color, type));
    }
}

// Collision detection (AABB)
function aabb(a, b) {
    return a.x < b.x + b.width &&
           a.x + a.width > b.x &&
           a.y < b.y + b.height &&
           a.y + a.height > b.y;
}

// Reset bear to start position
function resetBear() {
    bear.x = 50;
    bear.y = 480;
    bear.vx = 0;
    bear.vy = 0;
    bear.onGround = false;
    bear.facing = 1;
    bear.walkFrame = 0;
    bear.invincible = 90;
    bear.dead = false;
    bear.deathTimer = 0;
}

// Load level
function loadLevel(index) {
    if(index >= levels.length) return;
    currentLevel = index;
    
    // Deep copy level data so we can modify it
    const src = levels[index];
    levels[index].platforms = src.platforms.map(p => new Platform(p.x, p.y, p.width, p.height));
    levels[index].hives = src.hives.map(h => {
        const nh = new HoneyHive(h.x, h.y);
        nh.collected = false;
        return nh;
    });
    levels[index].bees = src.bees.map(b => 
        new Bee(b.startX, b.startY, b.patrolLeft, b.patrolRight)
    );
    
    resetBear();
}

    score = 0;

    resetBear();
}

// Handle bear hit
function bearHit() {
    if(bear.invincible > 0 || bear.dead) return;
    
    lives--;
    screenShake = 15;
    spawnParticles(bear.x + 18, bear.y + 20, RED, 20, 'spark');
    
    if(lives <= 0) {
        bear.dead = true;
        bear.deathTimer = 120;
    } else {
        resetBear();
    }
}

// Update game logic
function update() {
    frameCount++;
    
    if(gameState === 'START') {
        if(keys['Space']) {
            initGame();
            gameState = 'PLAYING';
        }
    } else if(gameState === 'GAME_OVER') {
        bear.deathTimer--;
        if(keys['Space'] && bear.deathTimer <= 0) {
            gameState = 'START';
            frameCount = 0;
        }
    } else if(gameState === 'LEVEL_COMPLETE') {
        levelTransitionTimer--;
        if(keys['Space'] && levelTransitionTimer <= 0) {
            if(currentLevel + 1 < levels.length) {
                loadLevel(currentLevel + 1);
            } else {
                gameState = 'START';
                frameCount = 0;
            }
            gameState = 'PLAYING';
        }
    } else if(gameState === 'PLAYING') {
        // Bear movement
        bear.vx = 0;
        if(keys['ArrowLeft'] || keys['KeyA']) {
            bear.vx = -BEAR_SPEED;
            bear.facing = -1;
        }
        if(keys['ArrowRight'] || keys['KeyD']) {
            bear.vx = BEAR_SPEED;
            bear.facing = 1;
        }
        
        // Jump
        if((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && bear.onGround) {
            bear.vy = JUMP_FORCE;
            bear.onGround = false;
            spawnParticles(bear.x + 18, bear.y + 40, GREEN, 5, 'glow');
        }
        
        // Gravity
        bear.vy += GRAVITY;
        
        // Move X
        bear.x += bear.vx;
        
        // Walk animation
        if(Math.abs(bear.vx) > 0.5 && bear.onGround) {
            bear.walkTimer++;
        }
        
        // Clamp to canvas
        if(bear.x < 0) bear.x = 0;
        if(bear.x + bear.width > canvas.width) bear.x = canvas.width - bear.width;
        
        // Platform collision X
        const levelData = levels[currentLevel];
        for(const plat of levelData.platforms) {
            if(aabb(bear, plat)) {
                if(bear.vx > 0) {
                    bear.x = plat.x - bear.width;
                } else if(bear.vx < 0) {
                    bear.x = plat.x + plat.width;
                }
            }
        }
        
        // Move Y
        bear.y += bear.vy;
        bear.onGround = false;
        
        // Platform collision Y
        for(const plat of levelData.platforms) {
            if(aabb(bear, plat)) {
                if(bear.vy > 0) {
                    bear.y = plat.y - bear.height;
                    bear.vy = 0;
                    bear.onGround = true;
                } else if(bear.vy < 0) {
                    bear.y = plat.y + plat.height;
                    bear.vy = 0;
                }
            }
        }
        
        // Fall death
        if(bear.y > canvas.height + 50) {
            bearHit();
            if(!bear.dead) {
                resetBear();
            }
        }
        
        // Invincibility timer
        if(bear.invincible > 0) bear.invincible--;
        
        // Update bees
        for(const bee of levelData.bees) {
            bee.update();
            
            // Bee collision with bear
            const beeBox = {x: bee.x, y: bee.y, width: bee.width, height: bee.height};
            if(aabb(bear, beeBox)) {
                bearHit();
            }
        }
        
        // Hive collection
        for(const hive of levelData.hives) {
            if(hive.collected) continue;
            const hiveBox = {x: hive.x, y: hive.y, width: hive.width, height: hive.height};
            if(aabb(bear, hiveBox)) {
                hive.collected = true;
                score += 100;
                spawnParticles(hive.x + 16, hive.y + 16, AMBER, 15, 'glow');
                spawnParticles(hive.x + 16, hive.y + 16, AMBER, 10, 'spark');
                
                // Check if all collected
                const remaining = levelData.hives.filter(h => !h.collected).length;
                if(remaining === 0) {
                    score += 500; // Level bonus
                    gameState = 'LEVEL_COMPLETE';
                    levelTransitionTimer = 60;
                    spawnParticles(canvas.width/2, canvas.height/2, AMBER, 40, 'glow');
                }
            }
        }
        
        // Death handling
        if(bear.dead) {
            bear.deathTimer--;
            if(bear.deathTimer <= 0) {
                gameState = 'GAME_OVER';
            }
        }
    }
    
    // Update particles
    particles.forEach(p => p.update());
    particles = particles.filter(p => p.life > 0);
    
    // Screen shake decay
    if(screenShake > 0) screenShake *= 0.85;
}

// Draw game
function draw() {
    ctx.save();
    
    // Apply screen shake
    if(screenShake > 0.5) {
        const sx = (Math.random() - 0.5) * screenShake;
        const sy = (Math.random() - 0.5) * screenShake;
        ctx.translate(sx, sy);
    }
    
    if(gameState === 'START') {
        drawStartScreen();
    } else if(gameState === 'GAME_OVER') {
        drawBackground();
        // Still draw game elements faded
        ctx.globalAlpha = 0.3;
        const levelData = levels[currentLevel] || levels[0];
        levelData.platforms.forEach(p => p.draw());
        levelData.hives.forEach(h => h.draw());
        levelData.bees.forEach(b => b.draw());
        ctx.globalAlpha = 1;
        drawGameOverScreen();
    } else if(gameState === 'LEVEL_COMPLETE') {
        drawBackground();
        const levelData = levels[currentLevel];
        levelData.platforms.forEach(p => p.draw());
        levelData.hives.forEach(h => h.draw());
        levelData.bees.forEach(b => b.draw());
        drawBear();
        drawLevelCompleteScreen();
    } else {
        // PLAYING state
        drawBackground();
        
        const levelData = levels[currentLevel];
        
        // Draw platforms
        levelData.platforms.forEach(p => p.draw());
        
        // Draw hives
        levelData.hives.forEach(h => h.draw());
        
        // Draw bees
        levelData.bees.forEach(b => b.draw());
        
        // Draw bear
        drawBear();
        
        // Draw particles
        particles.forEach(p => p.draw());
        
        // Draw HUD
        drawHUD();
    }
    
    ctx.restore();
}

// Game loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Start the game loop
gameLoop();
</script>
