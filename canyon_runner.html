<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canyon Runner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #1a1a2e;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
font-family: 'Courier New', monospace;
}
canvas {
    border: 2px solid #4a4a6a;
    border-radius: 4px;
    box-shadow: 0 0 30px rgba(100, 100, 255, 0.3);
  }
  #arcade-back-link {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 9999;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: 700;
    color: rgba(0,255,255,0.5);
    text-decoration: none;
    letter-spacing: 0.15em;
    padding: 6px 14px;
    border: 1px solid rgba(0,255,255,0.15);
    border-radius: 3px;
    background: rgba(0,0,20,0.7);
    backdrop-filter: blur(4px);
    transition: all 0.25s ease;
  }
  #arcade-back-link:hover {
    color: #0ff;
    border-color: #0ff;
    text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 15px rgba(0,255,255,0.3), inset 0 0 15px rgba(0,255,255,0.1);
    background: rgba(0,255,255,0.08);
  }
</style>
</head>
<body>
<a href="arcade.html" id="arcade-back-link"><< BACK TO ARCADE</a>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 800;

// Game state
let gameState = 'start';
let score = 0;
let highScore = parseInt(localStorage.getItem('canyonHighScore')) || 0;
let distance = 0;
let speed = 3;
let baseSpeed = 3;
let frameCount = 0;

// Canyon settings - wider canvas, more room to maneuver
const ROW_HEIGHT = 3;
let canyonRows = [];
const MAX_ROWS = Math.ceil(canvas.height / ROW_HEIGHT) + 30;
const canyonBaseWidth = 400;  // wider starting canyon
const canyonMinWidth = 130;   // narrower minimum
let canyonNoiseOffset = 0;

// Player jet
const jet = {
    x: canvas.width / 2,
    y: canvas.height - 140,
    width: 28,
    height: 36,
    vx: 0,
    tilt: 0
};

// Particles
let particles = [];
let explosionParticles = [];

// Input
const keys = {};

// Smooth random function - deterministic for a given coordinate
function smoothRand(x, y) {
    const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
    return n - Math.floor(n);
}

// Noise function for smooth canyon center path
function canyonNoise(x) {
    return Math.sin(x * 1.0) * 0.5
         + Math.sin(x * 2.7) * 0.25
         + Math.sin(x * 5.3) * 0.125
         + Math.sin(x * 10.1) * 0.0625;
}

// Generate all canyon wall points at once for a given distance offset
// Returns arrays of {leftX, rightX} for each row, computed fresh each time
function computeCanyonWalls() {
    const progress = Math.min(distance / 20000, 1);
    const currentWidth = canyonBaseWidth - (canyonBaseWidth - canyonMinWidth) * progress;
    baseSpeed = 3 + progress * 8;

    // Winding: gentle start for first 100m (1000 units), then ramps up
    const effectiveDistance = Math.max(0, distance - 1000);
    const earlyFactor = Math.min(effectiveDistance / 2000, 1);  // ramps up over first 200m
    // Base winding frequency; higher = more frequent turns
    const winding = 0.02 + progress * 0.025;
    // Canyon center must deviate ENOUGH so that walls encroach past the center line early on.
    // With 800px canvas (center=400), halfWidth=200, we need deviation > 200 to cross center.
    // At full strength: deviation 260px means walls are at 400±260 = 140 to 660 (well past center)
    // At start (earlyFactor=0): deviation should still be ~210+ so walls reach 400±210 = 190 to 610
    //   With halfWidth 200: left wall at 190, right wall at 610. Safe zone is 190-610, 420px wide.
    //   Jet at center (400) is safe, but jet must steer to follow the open corridor.
    const baseDeviation = 210 + progress * 120;
    const minDeviation = 210; // even at start, walls encroach past center
    const maxDeviation = Math.max(minDeviation, baseDeviation * (0.5 + 0.5 * earlyFactor));

    const walls = [];
    for (let i = 0; i < MAX_ROWS; i++) {
        const scrollY = -i * ROW_HEIGHT;
        const noiseVal = canyonNoise(scrollY * winding + canyonNoiseOffset);

        const centerX = canvas.width / 2 + noiseVal * maxDeviation;
        const halfW = currentWidth / 2;

        // Static craggy wall offsets (based on row index only, no animation movement)
        const leftCraggy = Math.sin(i * 1.7 + canyonNoiseOffset) * 6
                         + Math.sin(i * 3.3 + canyonNoiseOffset * 2) * 3;
        const rightCraggy = Math.sin(i * 2.1 + canyonNoiseOffset * 3) * 6
                          + Math.sin(i * 4.1 + canyonNoiseOffset * 1.5) * 3;

        walls.push({
            centerX: centerX,
            halfWidth: halfW,
            leftX: centerX - halfW + leftCraggy,
            rightX: centerX + halfW + rightCraggy
        });
    }
    return walls;
}

let cachedWalls = [];
let cachedDistance = -999999;

// Get cached wall positions, recomputing only when distance changes significantly
function getWallsAtDistance() {
    const distKey = Math.floor(distance / 5);
    if (cachedDistance !== distKey) {
        cachedWalls = computeCanyonWalls();
        cachedDistance = distKey;
    }
    return cachedWalls;
}

// Initialize canyon
function initCanyon() {
    getWallsAtDistance();
}

// Reset game
function resetGame() {
    score = 0;
    distance = 0;
    speed = 3;
    baseSpeed = 3;
    frameCount = 0;
    canyonNoiseOffset = Math.random() * 100;

    jet.x = canvas.width / 2;
    jet.y = canvas.height - 140;
    jet.vx = 0;
    jet.tilt = 0;

    particles = [];
    explosionParticles = [];
    cachedDistance = -999999;

    initCanyon();
}

// Get wall X positions at a given screen Y coordinate
function getWallAtScreenY(screenY) {
    const walls = getWallsAtDistance();

    // Match drawCanyon's calculation exactly:
    // drawCanyon does: screenY = ((-i * ROW_HEIGHT + distance) % (MAX_ROWS * ROW_HEIGHT))
    // So: screenY = ((distance - i * ROW_HEIGHT) % cycleLen)
    // Rearranged: i = (distance - screenY) / ROW_HEIGHT  (for the matching wall)
    const cycleLen = MAX_ROWS * ROW_HEIGHT;
    let screenYNormalized = ((distance - screenY) % cycleLen);
    if (screenYNormalized < 0) screenYNormalized += cycleLen;
    const wallIdx = Math.floor(screenYNormalized / ROW_HEIGHT);

    if (wallIdx < 0 || wallIdx >= walls.length) return null;
    return walls[wallIdx];
}

// Spawn thrust particles
function spawnThrustParticle() {
    particles.push({
        x: jet.x + (Math.random() - 0.5) * 10,
        y: jet.y + jet.height / 2,
        vx: (Math.random() - 0.5) * 2,
        vy: Math.random() * 3 + 2,
        life: 1,
        decay: 0.03 + Math.random() * 0.03,
        size: Math.random() * 4 + 2,
        color: Math.random() > 0.5 ? 'flame' : 'smoke'
    });
}

// Spawn explosion particles
function spawnExplosion() {
    for (let i = 0; i < 80; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * 7 + 1;
        explosionParticles.push({
            x: jet.x,
            y: jet.y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            life: 1,
            decay: 0.008 + Math.random() * 0.015,
            size: Math.random() * 7 + 2,
            color: ['fire', 'smoke', 'spark'][Math.floor(Math.random() * 3)]
        });
    }
}

// Update particles
function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = explosionParticles.length - 1; i >= 0; i--) {
        const p = explosionParticles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.98;
        p.vy *= 0.98;
        p.life -= p.decay;
        if (p.life <= 0) explosionParticles.splice(i, 1);
    }
}

// Draw particles
function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        if (p.color === 'flame') {
            const g = Math.floor(100 + 155 * p.life);
            ctx.fillStyle = `rgb(255,${g},0)`;
        } else {
            const g = Math.floor(80 * p.life);
            ctx.fillStyle = `rgb(${g},${g},${g})`;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
    }

    for (const p of explosionParticles) {
        ctx.globalAlpha = p.life;
        if (p.color === 'fire') {
            const g = Math.floor(80 + 120 * p.life);
            ctx.fillStyle = `rgb(255,${g},0)`;
        } else if (p.color === 'spark') {
            ctx.fillStyle = `rgb(255,255,${Math.floor(200 * p.life)})`;
        } else {
            const v = Math.floor(60 + 80 * p.life);
            ctx.fillStyle = `rgb(${v},${v},${v})`;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (0.3 + 0.7 * p.life), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// Draw the jet
function drawJet() {
    ctx.save();
    ctx.translate(jet.x, jet.y);
    ctx.rotate(jet.tilt * 0.15);

    // Jet body
    ctx.fillStyle = '#e0e0e0';
    ctx.beginPath();
    ctx.moveTo(0, -jet.height / 2);
    ctx.lineTo(-jet.width / 2, jet.height / 2);
    ctx.lineTo(-jet.width / 6, jet.height / 3);
    ctx.lineTo(jet.width / 6, jet.height / 3);
    ctx.lineTo(jet.width / 2, jet.height / 2);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    ctx.fillStyle = '#4a9eff';
    ctx.beginPath();
    ctx.ellipse(0, -jet.height / 6, 4, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wing accents
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.moveTo(-3, jet.height / 6);
    ctx.lineTo(-jet.width / 2 + 2, jet.height / 2 - 2);
    ctx.lineTo(-jet.width / 6, jet.height / 4);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(3, jet.height / 6);
    ctx.lineTo(jet.width / 2 - 2, jet.height / 2 - 2);
    ctx.lineTo(jet.width / 6, jet.height / 4);
    ctx.closePath();
    ctx.fill();

    // Thrust flame
    if (gameState === 'playing') {
        const flameLen = 8 + Math.random() * 8 + (keys['ArrowUp'] ? 12 : 0);
        const gradient = ctx.createLinearGradient(0, jet.height / 3, 0, jet.height / 3 + flameLen);
        gradient.addColorStop(0, 'rgba(255,255,200,0.9)');
        gradient.addColorStop(0.4, 'rgba(255,150,0,0.7)');
        gradient.addColorStop(1, 'rgba(255,50,0,0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(-6, jet.height / 3);
        ctx.lineTo(6, jet.height / 3);
        ctx.lineTo(2, jet.height / 3 + flameLen);
        ctx.lineTo(-2, jet.height / 3 + flameLen);
        ctx.closePath();
        ctx.fill();
    }

    ctx.restore();
}

// Draw canyon with craggy, dynamic walls
function drawCanyon() {
    const progress = Math.min(distance / 20000, 1);

    // Background gradient (dark canyon atmosphere)
    const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGrad.addColorStop(0, '#050308');
    bgGrad.addColorStop(0.5, '#0a0610');
    bgGrad.addColorStop(1, '#050308');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw stars visible through canyon
    for (let i = 0; i < 40; i++) {
        const sx = (i * 137.5 + distance * 0.01) % canvas.width;
        const sy = (i * 97.3 + distance * 0.05) % canvas.height;
        const twinkle = Math.sin(frameCount * 0.05 + i) * 0.3 + 0.4;
        ctx.globalAlpha = twinkle;
        ctx.fillStyle = '#aabbff';
        ctx.fillRect(sx, sy, 1.5, 1.5);
    }
    ctx.globalAlpha = 1;

    const walls = getWallsAtDistance();

    // Draw canyon row by row
    for (let i = 0; i < walls.length; i++) {
        const wall = walls[i];
        const screenY = ((-i * ROW_HEIGHT + distance) % (MAX_ROWS * ROW_HEIGHT));
        const adjustedY = screenY < 0 ? screenY + MAX_ROWS * ROW_HEIGHT : screenY;

        if (adjustedY < -ROW_HEIGHT || adjustedY > canvas.height + ROW_HEIGHT) continue;

        // Floor (ground at bottom of canyon)
        const floorR = Math.floor(50 + 30 * (1 - progress));
        const floorG = Math.floor(30 + 20 * (1 - progress));
        const floorB = Math.floor(10 + 10 * (1 - progress));
        ctx.fillStyle = `rgb(${floorR},${floorG},${floorB})`;
        ctx.fillRect(wall.leftX, adjustedY, wall.rightX - wall.leftX, ROW_HEIGHT + 1);

        // Left wall - gradient from dark to light at edge
        const lGrad = ctx.createLinearGradient(0, 0, wall.leftX, 0);
        lGrad.addColorStop(0, '#08040a');
        lGrad.addColorStop(0.3, '#1a0e20');
        lGrad.addColorStop(0.6, '#2a1830');
        lGrad.addColorStop(0.8, '#4a2840');
        lGrad.addColorStop(0.95, '#6a3850');
        lGrad.addColorStop(1, '#8a5060');
        ctx.fillStyle = lGrad;
        ctx.fillRect(0, adjustedY, wall.leftX, ROW_HEIGHT + 1);

        // Right wall - gradient from light at edge to dark
        const rGrad = ctx.createLinearGradient(wall.rightX, 0, canvas.width, 0);
        rGrad.addColorStop(0, '#8a5060');
        rGrad.addColorStop(0.05, '#6a3850');
        rGrad.addColorStop(0.2, '#4a2840');
        rGrad.addColorStop(0.4, '#2a1830');
        rGrad.addColorStop(0.7, '#1a0e20');
        rGrad.addColorStop(1, '#08040a');
        ctx.fillStyle = rGrad;
        ctx.fillRect(wall.rightX, adjustedY, canvas.width - wall.rightX, ROW_HEIGHT + 1);

        // Bright edge highlight with craggy variation
        const edgePulse = 0.4 + Math.sin(i * 1.3 + frameCount * 0.05) * 0.25;
        ctx.fillStyle = `rgba(200,140,100,${edgePulse})`;
        ctx.fillRect(Math.floor(wall.leftX) - 1, adjustedY, 3, ROW_HEIGHT + 1);
        ctx.fillRect(Math.floor(wall.rightX) - 1, adjustedY, 3, ROW_HEIGHT + 1);
    }
}

// Draw HUD
function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(10, 10, 210, 65);
    ctx.strokeStyle = '#4a9eff';
    ctx.lineWidth = 1;
    ctx.strokeRect(10, 10, 210, 65);

    ctx.fillStyle = '#ffffff';
    ctx.font = '16px Courier New';
    ctx.fillText(`DISTANCE: ${Math.floor(distance / 10)}m`, 20, 32);

    ctx.fillStyle = '#4a9eff';
    ctx.fillText(`SPEED: ${Math.floor(speed * 30)} km/h`, 20, 56);

    if (highScore > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(canvas.width - 190, 10, 180, 30);
        ctx.strokeStyle = '#ffaa00';
        ctx.strokeRect(canvas.width - 190, 10, 180, 30);

        ctx.fillStyle = '#ffaa00';
        ctx.font = '14px Courier New';
        ctx.fillText(`BEST: ${Math.floor(highScore / 10)}m`, canvas.width - 180, 30);
    }

    const progress = Math.min(distance / 20000, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(canvas.width - 190, 50, 180, 25);
    const dangerR = Math.floor(progress * 255);
    const dangerG = Math.floor((1 - progress) * 200);
    ctx.fillStyle = `rgb(${dangerR},${dangerG},0)`;
    ctx.fillRect(canvas.width - 188, 52, 176 * progress, 21);
    ctx.strokeStyle = '#ffffff';
    ctx.strokeRect(canvas.width - 190, 50, 180, 25);

    ctx.fillStyle = '#fff';
    ctx.font = '10px Courier New';
    ctx.fillText('DANGER LEVEL', canvas.width - 140, 66);
}

// Draw start screen
function drawStartScreen() {
    drawCanyon();

    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 52px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('CANYON', canvas.width / 2, canvas.height / 2 - 100);
    ctx.fillStyle = '#ff6600';
    ctx.fillText('RUNNER', canvas.width / 2, canvas.height / 2 - 45);

    ctx.fillStyle = '#4a9eff';
    ctx.font = '16px Courier New';
    ctx.fillText('Navigate the narrowing canyon!', canvas.width / 2, canvas.height / 2 + 5);

    ctx.fillStyle = '#aaaaaa';
    ctx.font = '14px Courier New';
    ctx.fillText('Arrow Keys: Steer & Control Speed', canvas.width / 2, canvas.height / 2 + 55);
    ctx.fillText('↑ Boost    ↓ Slow    ← → Steer', canvas.width / 2, canvas.height / 2 + 80);

    const blink = Math.sin(Date.now() * 0.005) > 0;
    if (blink) {
        ctx.fillStyle = '#ffffff';
        ctx.font = '20px Courier New';
        ctx.fillText('Press ENTER to Start', canvas.width / 2, canvas.height / 2 + 145);
    }

    if (highScore > 0) {
        ctx.fillStyle = '#ffaa00';
        ctx.font = '16px Courier New';
        ctx.fillText(`High Score: ${Math.floor(highScore / 10)}m`, canvas.width / 2, canvas.height / 2 + 195);
    }

    ctx.textAlign = 'left';
}

// Draw game over screen
function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('CRASHED!', canvas.width / 2, canvas.height / 2 - 80);

    ctx.fillStyle = '#ffffff';
    ctx.font = '20px Courier New';
    ctx.fillText(`Distance: ${Math.floor(distance / 10)}m`, canvas.width / 2, canvas.height / 2 - 20);

    if (Math.floor(distance / 10) >= Math.floor(highScore / 10)) {
        ctx.fillStyle = '#ffaa00';
        ctx.font = '18px Courier New';
        ctx.fillText('★ NEW HIGH SCORE! ★', canvas.width / 2, canvas.height / 2 + 15);
    }

    ctx.fillStyle = '#aaaaaa';
    ctx.font = '16px Courier New';
    ctx.fillText(`Best: ${Math.floor(highScore / 10)}m`, canvas.width / 2, canvas.height / 2 + 50);

    const blink = Math.sin(Date.now() * 0.005) > 0;
    if (blink) {
        ctx.fillStyle = '#ffffff';
        ctx.font = '18px Courier New';
        ctx.fillText('Press ENTER to Retry', canvas.width / 2, canvas.height / 2 + 110);
    }

    ctx.textAlign = 'left';
}

// Check collision - uses exact wall positions at jet screen position
function checkCollision() {
    // Check multiple Y positions across the jet's height for accuracy
    // Use fine-grained checks every 2px vertically
    const hitW = jet.width / 2 - 3; // slightly forgiving hitbox (jet.width/2 - 3px margin)
    for (let dy = -jet.height / 2; dy <= jet.height / 2; dy += 2) {
        const cy = jet.y + dy;
        const wall = getWallAtScreenY(cy);
        if (!wall) continue;

        // Check if jet edges penetrate wall boundaries
        // Left wall: crash if jet's left edge goes past (left of) canyon's left wall edge
        const jetLeftEdge = jet.x - hitW;
        const jetRightEdge = jet.x + hitW;

        // Left wall collision: jet left edge is to the LEFT of the canyon's left wall
        if (jetLeftEdge < wall.leftX + 2) {
            return true;
        }
        // Right wall collision: jet right edge is to the RIGHT of the canyon's right wall
        if (jetRightEdge > wall.rightX - 2) {
            return true;
        }
    }
    return false;
}

// Handle input
function handleInput() {
    if (gameState === 'start') {
        if (keys['Enter']) {
            gameState = 'playing';
            resetGame();
        }
        return;
    }

    if (gameState === 'gameover') {
        if (keys['Enter']) {
            gameState = 'playing';
            resetGame();
        }
        return;
    }

    // Playing state input
    if (keys['ArrowLeft']) {
        jet.vx -= 0.8;
        jet.tilt = Math.max(jet.tilt - 0.1, -1);
    } else if (keys['ArrowRight']) {
        jet.vx += 0.8;
        jet.tilt = Math.min(jet.tilt + 0.1, 1);
    } else {
        jet.tilt *= 0.9;
    }

    if (keys['ArrowUp']) {
        speed = baseSpeed * 1.6;
        spawnThrustParticle();
        spawnThrustParticle();
    } else if (keys['ArrowDown']) {
        speed = baseSpeed * 0.5;
    } else {
        speed = baseSpeed;
    }
}

// Update game logic
function update() {
    if (gameState !== 'playing') return;

    frameCount++;

    // Update jet position
    jet.vx *= 0.88;
    jet.x += jet.vx;

    // Keep jet in bounds horizontally
    if (jet.x < jet.width / 2) {
        jet.x = jet.width / 2;
        jet.vx = 0;
    }
    if (jet.x > canvas.width - jet.width / 2) {
        jet.x = canvas.width - jet.width / 2;
        jet.vx = 0;
    }

    // Update distance and speed smoothing
    distance += speed;
    score = distance;

    // Smooth speed transitions
    const targetSpeed = keys['ArrowUp'] ? baseSpeed * 1.6 : (keys['ArrowDown'] ? baseSpeed * 0.5 : baseSpeed);
    speed += (targetSpeed - speed) * 0.1;

    // Generate thrust particles
    if (frameCount % 2 === 0) {
        spawnThrustParticle();
    }

    // Check collision
    if (checkCollision()) {
        gameState = 'gameover';
        spawnExplosion();
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('canyonHighScore', highScore);
        }
    }

    updateParticles();
}

// Main game loop
function gameLoop() {
    handleInput();
    update();

    if (gameState === 'start') {
        drawStartScreen();
    } else if (gameState === 'playing') {
        drawCanyon();
        drawParticles();
        drawJet();
        drawHUD();
    } else if (gameState === 'gameover') {
        drawCanyon();
        drawExplosionParticles();
        drawGameOverScreen();
    }

    requestAnimationFrame(gameLoop);
}

function drawExplosionParticles() {
    for (const p of explosionParticles) {
        ctx.globalAlpha = p.life;
        if (p.color === 'fire') {
            const g = Math.floor(80 + 120 * p.life);
            ctx.fillStyle = `rgb(255,${g},0)`;
        } else if (p.color === 'spark') {
            ctx.fillStyle = `rgb(255,255,${Math.floor(200 * p.life)})`;
        } else {
            const v = Math.floor(60 + 80 * p.life);
            ctx.fillStyle = `rgb(${v},${v},${v})`;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (0.3 + 0.7 * p.life), 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// Event listeners
document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Enter', ' '].includes(e.key)) {
        e.preventDefault();
    }
});

document.addEventListener('keyup', (e) => {
