<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychedelic Spiral</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
#arcade-back-link {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 9999;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: 700;
    color: rgba(0,255,255,0.5);
    text-decoration: none;
    letter-spacing: 0.15em;
    padding: 6px 14px;
    border: 1px solid rgba(0,255,255,0.15);
    border-radius: 3px;
    background: rgba(0,0,20,0.7);
    backdrop-filter: blur(4px);
    transition: all 0.25s ease;
}
#arcade-back-link:hover {
    color: #0ff;
    border-color: #0ff;
    text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 15px rgba(0,255,255,0.3), inset 0 0 15px rgba(0,255,255,0.1);
    background: rgba(0,255,255,0.08);
}
</style>
</head>
<body>
<a href="arcade.html" id="arcade-back-link"><< BACK TO ARCADE</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy, maxR;
let t = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
  maxR = Math.max(W, H) * 0.7;
}
resize();
window.addEventListener('resize', resize);

// Smooth gradient helper
function gradientRadial(x, y, r, colorStops) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  for (const [offset, color] of colorStops) {
    grad.addColorStop(offset, color);
  }
  return grad;
}

function animate() {
  // Very slow fade for long, lush trails
  ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
  ctx.fillRect(0, 0, W, H);

  t += 0.008;

  // Background ambient glow that slowly shifts
  const glowHue = (t * 15) % 360;
  const glowR = maxR * 1.2;
  const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
  bgGrad.addColorStop(0, `hsla(${glowHue}, 80%, 15%, 0.02)`);
  bgGrad.addColorStop(0.5, `hsla(${(glowHue + 60) % 360}, 60%, 8%, 0.01)`);
  bgGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Main mesmerizing spiral — a single beautiful multi-layered spiral
  const numSpirals = 6;
  const pointsPerSpiral = 1500;

  for (let s = 0; s < numSpirals; s++) {
    const baseAngle = (s / numSpirals) * Math.PI * 2;
    const speed = 0.6 + s * 0.15;
    const dir = (s % 2 === 0) ? 1 : -1;

    ctx.beginPath();
    for (let i = 0; i < pointsPerSpiral; i++) {
      const p = i / pointsPerSpiral;
      const r = p * maxR;

      // Archimedean spiral with organic modulation
      const twist = p * Math.PI * (4 + Math.sin(t * 0.2) * 1.5);
      const angle = baseAngle + dir * twist + t * speed;

      // Organic wobble — gentle breathing
      const breathe = Math.sin(p * 8 - t * 1.5 + s) * (8 + p * 15);
      const rMod = r + breathe;

      // Subtle vertical offset for 3D feel
      const tilt = Math.sin(t * 0.3 + s * 0.8) * 0.15;
      const x = cx + rMod * Math.cos(angle);
      const y = cy + rMod * Math.sin(angle) + (rMod * tilt * Math.sin(angle));

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    // Color for this spiral — rainbow cycling
    const hueBase = (t * 25 + s * (360 / numSpirals)) % 360;
    const sat = 75 + Math.sin(t + s * 0.5) * 20;
    const light = 45 + Math.sin(t * 1.3 + s) * 15;

    // Create gradient along the spiral
    ctx.strokeStyle = `hsla(${hueBase}, ${sat}%, ${light}%, 0.7)`;
    ctx.lineWidth = 2.5 + Math.sin(t * 0.7 + s) * 0.8;
    ctx.shadowBlur = 20;
    ctx.shadowColor = `hsla(${hueBase}, 90%, 50%, 0.5)`;
    ctx.stroke();
  }

  ctx.shadowBlur = 0;

  // Floating luminous orbs along the spiral arms
  const numOrbs = 18;
  for (let i = 0; i < numOrbs; i++) {
    const orbSpiral = i % numSpirals;
    const baseAngle = (orbSpiral / numSpirals) * Math.PI * 2;
    const dir = (orbSpiral % 2 === 0) ? 1 : -1;
    const speed = 0.6 + orbSpiral * 0.15;

    // Position along spiral at varying distances
    const pPos = 0.1 + (i / numOrbs) * 0.75;
    const r = pPos * maxR;
    const twist = pPos * Math.PI * (4 + Math.sin(t * 0.2) * 1.5);
    const angle = baseAngle + dir * twist + t * speed;

    const breathe = Math.sin(pPos * 8 - t * 1.5 + orbSpiral) * (8 + pPos * 15);
    const rMod = r + breathe;
    const tilt = Math.sin(t * 0.3 + orbSpiral * 0.8) * 0.15;
    const x = cx + rMod * Math.cos(angle);
    const y = cy + rMod * Math.sin(angle) + (rMod * tilt * Math.sin(angle));

    // Orb color
    const orbHue = (t * 30 + i * 37) % 360;
    const orbSize = 4 + Math.sin(t * 2 + i * 1.3) * 2.5;

    // Outer glow
    const orbGrad = ctx.createRadialGradient(x, y, 0, x, y, orbSize * 4);
    orbGrad.addColorStop(0, `hsla(${orbHue}, 100%, 75%, 0.6)`);
    orbGrad.addColorStop(0.3, `hsla(${orbHue}, 90%, 55%, 0.2)`);
    orbGrad.addColorStop(1, `hsla(${orbHue}, 80%, 40%, 0)`);

    ctx.beginPath();
    ctx.arc(x, y, orbSize * 4, 0, Math.PI * 2);
    ctx.fillStyle = orbGrad;
    ctx.fill();

    // Bright core
    ctx.beginPath();
    ctx.arc(x, y, orbSize * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${orbHue}, 50%, 95%, 0.9)`;
    ctx.fill();
  }

  // Center glow — pulsing heart of the spiral
  const centerPulse = 1 + Math.sin(t * 1.2) * 0.15;
  const centerHue = (t * 20) % 360;
  const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80 * centerPulse);
  centerGrad.addColorStop(0, `hsla(${centerHue}, 60%, 90%, 0.3)`);
  centerGrad.addColorStop(0.3, `hsla(${centerHue}, 80%, 50%, 0.1)`);
  centerGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, 80 * centerPulse, 0, Math.PI * 2);
  ctx.fillStyle = centerGrad;
  ctx.fill();

  requestAnimationFrame(animate);
}

// Initial clear
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, W, H);

animate();
</script>
</body>
</html>
