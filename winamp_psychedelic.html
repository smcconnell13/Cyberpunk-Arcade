<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psychedelic Visualizer v2.066</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    cursor: none;
    font-family: 'Courier New', monospace;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
  #info {
    position: fixed;
    bottom: 10px;
    left: 10px;
    color: #0f0;
    font-size: 10px;
    opacity: 0.5;
    z-index: 10;
    text-shadow: 0 0 5px #0f0;
  }
  #title {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 14px;
    font-weight: bold;
    z-index: 10;
    text-shadow: 0 0 10px #f0f, 0 0 20px #0ff, 0 0 30px #f0f;
    letter-spacing: 4px;
    animation: titlePulse 2s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  #arcade-back-link {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 9999;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: 700;
    color: rgba(0,255,255,0.5);
    text-decoration: none;
    letter-spacing: 0.15em;
    padding: 6px 14px;
    border: 1px solid rgba(0,255,255,0.15);
    border-radius: 3px;
    background: rgba(0,0,20,0.7);
    backdrop-filter: blur(4px);
    transition: all 0.25s ease;
  }
  #arcade-back-link:hover {
    color: #0ff;
    border-color: #0ff;
    text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 15px rgba(0,255,255,0.3), inset 0 0 15px rgba(0,255,255,0.1);
    background: rgba(0,255,255,0.08);
  }
</style>
</head>
<body>
<a href="arcade.html" id="arcade-back-link"><< BACK TO ARCADE</a>
<canvas id="canvas"></canvas>
<div id="title">◄ PROJECT HYPERDRIVE VISUALIZER ►</div>
<div id="info">CLICK: MODE | SPACE: BOOM | ARROWS: WARP</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;
let time = 0;
let mode = 0;
let modes = 6;
let boom = 0;
let warp = 0;
let mouseX = 0, mouseY = 0;
let hueShift = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Color palette - neon on black
function neonColor(hue, alpha = 1) {
  const r = Math.floor(128 + 127 * Math.sin(hue * 0.017));
  const g = Math.floor(128 + 127 * Math.sin(hue * 0.017 + 2.094));
  const b = Math.floor(128 + 127 * Math.sin(hue * 0.017 + 4.189));
  return `rgba(${r},${g},${b},${alpha})`;
}

// Utility functions
function rand(min, max) { return Math.random() * (max - min) + min; }
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// Particle class
class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = rand(0, W);
    this.y = rand(0, H);
    this.vx = rand(-2, 2);
    this.vy = rand(-2, 2);
    this.life = rand(50, 200);
    this.maxLife = this.life;
    this.size = rand(1, 4);
    this.hue = rand(0, 360);
  }
  update() {
    this.x += this.vx + Math.sin(time * 0.02 + this.y * 0.01) * 0.5;
    this.y += this.vy + Math.cos(time * 0.02 + this.x * 0.01) * 0.5;
    this.life--;
    this.hue += 2;
    if (this.life <= 0 || this.x < -50 || this.x > W + 50 || this.y < -50 || this.y > H + 50) this.reset();
  }
  draw() {
    const alpha = this.life / this.maxLife;
    ctx.fillStyle = neonColor(this.hue, alpha);
    ctx.shadowBlur = 10;
    ctx.shadowColor = neonColor(this.hue, 0.5);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * (1 + boom * 0.5), 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// Spiral visualization (classic Winamp style)
function drawSpiral() {
  const cx = W / 2;
  const cy = H / 2;
  const arms = 5;
  const maxRadius = Math.max(W, H) * 0.6;

  for (let arm = 0; arm < arms; arm++) {
    const armOffset = (arm / arms) * Math.PI * 2;
    ctx.beginPath();

    for (let i = 0; i < 500; i++) {
      const t = i / 500;
      const angle = t * Math.PI * 8 + armOffset + time * 0.02 * (1 + warp * 0.5);
      const radius = t * maxRadius * (1 + boom * 0.3);
      const x = cx + Math.cos(angle) * radius;
      const y = cy + Math.sin(angle) * radius;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    const hue = (time * 2 + arm * 72 + hueShift) % 360;
    ctx.strokeStyle = neonColor(hue, 0.8);
    ctx.lineWidth = 2 + Math.sin(time * 0.05 + arm) * 1.5;
    ctx.shadowBlur = 15;
    ctx.shadowColor = neonColor(hue, 0.6);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// 3D Torus (classic demo scene / winamp style)
function drawTorus() {
  const cx = W / 2;
  const cy = H / 2;
  const numRing1 = 40;
  const numRing2 = 20;
  const R = 120 + boom * 50;
  const r = 50 + Math.sin(time * 0.03) * 20;

  for (let i = 0; i < numRing1; i++) {
    const angle1 = (i / numRing1) * Math.PI * 2 + time * 0.01;
    const x1 = cx + R * Math.cos(angle1);
    const y1 = cy + R * Math.sin(angle1);

    ctx.beginPath();
    for (let j = 0; j <= numRing2; j++) {
      const angle2 = (j / numRing2) * Math.PI * 2;
      const x2 = x1 + r * Math.cos(angle2 + time * 0.02) * Math.cos(angle1);
      const y2 = y1 + r * Math.cos(angle2 + time * 0.02) * Math.sin(angle1);
      const z = r * Math.sin(angle2 + time * 0.02);

      const scale = 400 / (400 + z);
      const px = cx + (x2 - cx) * scale;
      const py = cy + (y2 - cy) * scale;

      if (j === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }

    const hue = (time * 3 + i * 9) % 360;
    ctx.strokeStyle = neonColor(hue, 0.6);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// Waveform visualization (Winamp spectrum style)
function drawWaveform() {
  const numWaves = 8;
  for (let w = 0; w < numWaves; w++) {
    ctx.beginPath();
    const baseY = H * 0.3 + w * 40;
    const amplitude = 80 + boom * 100;
    const frequency = 0.005 + warp * 0.01;
    const speed = time * (0.03 + w * 0.005);

    for (let x = 0; x <= W; x += 3) {
      const y = baseY +
        Math.sin(x * frequency + speed) * amplitude * Math.sin(x * 0.002 + time * 0.01) +
        Math.sin(x * frequency * 2.5 + speed * 1.5) * amplitude * 0.3 +
        Math.cos(x * frequency * 0.5 + speed * 0.7) * amplitude * 0.5;

      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    const hue = (time * 4 + w * 45 + hueShift) % 360;
    ctx.strokeStyle = neonColor(hue, 0.7);
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 20;
    ctx.shadowColor = neonColor(hue, 0.8);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// Geometric pattern - Winamp GL Plugin style
function drawGeometry() {
  const cx = W / 2;
  const cy = H / 2;
  const sides = 6 + Math.floor(Math.sin(time * 0.01) * 3 + 3);
  const layers = 8;

  for (let layer = layers; layer >= 0; layer--) {
    const radius = 50 + layer * 60 + boom * 30;
    const rotation = time * 0.01 * (layer % 2 === 0 ? 1 : -1) * (1 + warp * 0.5);

    ctx.beginPath();
    for (let i = 0; i <= sides; i++) {
      const angle = (i / sides) * Math.PI * 2 + rotation;
      const x = cx + Math.cos(angle) * radius;
      const y = cy + Math.sin(angle) * radius;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();

    const hue = (time * 5 + layer * 40 + hueShift) % 360;
    ctx.strokeStyle = neonColor(hue, 0.8);
    ctx.lineWidth = 2;
    ctx.shadowBlur = 15;
    ctx.shadowColor = neonColor(hue, 0.5);
    ctx.stroke();

    // Fill with gradient
    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    gradient.addColorStop(0, neonColor(hue, 0.1));
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// Tunnel / vortex effect
function drawTunnel() {
  const cx = W / 2;
  const cy = H / 2;
  const numRings = 30;

  for (let i = 0; i < numRings; i++) {
    const progress = ((i / numRings + time * 0.01) % 1);
    const radius = progress * Math.max(W, H);
    const rotation = progress * Math.PI * 4 + time * 0.02;
    const hue = (progress * 360 + time * 5 + hueShift) % 360;
    const alpha = (1 - progress) * 0.6;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);

    ctx.beginPath();
    const segments = 12;
    for (let j = 0; j <= segments; j++) {
      const angle = (j / segments) * Math.PI * 2;
      const wobble = Math.sin(angle * 6 + time * 0.05) * 20 * progress;
      const r = radius + wobble + boom * 20;
      const x = Math.cos(angle) * r;
      const y = Math.sin(angle) * r;

      if (j === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();

    ctx.strokeStyle = neonColor(hue, alpha);
    ctx.lineWidth = 3;
    ctx.shadowBlur = 10;
    ctx.shadowColor = neonColor(hue, alpha * 0.5);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// Floating cubes / wireframe shapes
function drawWireframeCubes() {
  const numCubes = 7;
  for (let c = 0; c < numCubes; c++) {
    const cx = W * 0.2 + (W * 0.6 / numCubes) * c + Math.sin(time * 0.01 + c) * 30;
    const cy = H * 0.5 + Math.cos(time * 0.015 + c * 0.5) * 100;
    const size = 40 + boom * 30;
    const rotX = time * 0.02 + c;
    const rotY = time * 0.015 + c * 0.7;
    const hue = (time * 3 + c * 50 + hueShift) % 360;

    // Cube vertices
    const vertices = [];
    for (let v = 0; v < 8; v++) {
      let x = (v & 1) - 0.5;
      let y = ((v >> 1) & 1) - 0.5;
      let z = ((v >> 2) & 1) - 0.5;

      // Rotate X
      const y1 = y * Math.cos(rotX) - z * Math.sin(rotX);
      const z1 = y * Math.sin(rotX) + z * Math.cos(rotX);
      // Rotate Y
      const x1 = x * Math.cos(rotY) + z1 * Math.sin(rotY);
      const z2 = -x * Math.sin(rotY) + z1 * Math.cos(rotY);

      vertices.push({
        x: cx + x1 * size,
        y: cy + y1 * size
      });
    }

    // Draw edges
    const edges = [
      [0,1],[1,3],[3,2],[2,0],
      [4,5],[5,7],[7,6],[6,4],
      [0,4],[1,5],[2,6],[3,7]
    ];

    ctx.strokeStyle = neonColor(hue, 0.7);
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 10;
    ctx.shadowColor = neonColor(hue, 0.5);

    edges.forEach(([a, b]) => {
      ctx.beginPath();
      ctx.moveTo(vertices[a].x, vertices[a].y);
      ctx.lineTo(vertices[b].x, vertices[b].y);
      ctx.stroke();
    });

    ctx.shadowBlur = 0;
  }
}

// Starfield with warp effect
function drawStarfield() {
  const cx = W / 2;
  const cy = H / 2;
  const numStars = 200;

  for (let i = 0; i < numStars; i++) {
    const angle = (i / numStars) * Math.PI * 2 * 3;
    const dist = ((i * 37 + time * (2 + warp * 20)) % (Math.max(W, H) * 0.8));
    const x = cx + Math.cos(angle + time * 0.005) * dist;
    const y = cy + Math.sin(angle + time * 0.005) * dist;
    const size = Math.max(1, (dist / Math.max(W, H)) * 4);
    const hue = (i * 3 + time * 5 + hueShift) % 360;
    const alpha = 1 - dist / (Math.max(W, H) * 0.8);

    ctx.fillStyle = neonColor(hue, alpha);
    ctx.shadowBlur = 5;
    ctx.shadowColor = neonColor(hue, 0.5);
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

// Matrix rain effect
function drawMatrixRain() {
  const cols = Math.floor(W / 15);
  ctx.font = '10px Courier New';

  for (let i = 0; i < cols; i++) {
    const x = i * 15 + 7;
    const speed = 1 + Math.sin(i * 0.3) * 0.5;
    const y = ((time * speed * 3 + i * 50) % (H + 100)) - 50;
    const hue = (i * 5 + time * 3 + hueShift) % 360;

    ctx.fillStyle = neonColor(hue, 0.6);
    ctx.shadowBlur = 5;
    ctx.shadowColor = neonColor(hue, 0.4);

    const chars = '01アイウエオカキクケコサシスセソ<>{}[]';
    const char = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(char, x, y);
  }
  ctx.shadowBlur = 0;
}

// Audio spectrum simulator (Winamp main window style)
function drawFakeSpectrum() {
  const bars = 64;
  const barWidth = W / bars;
  const maxBarH = H * 0.4;
  const baseY = H * 0.85;

  for (let i = 0; i < bars; i++) {
    const h = (Math.sin(time * 0.1 + i * 0.3) * 0.5 + 0.5) *
              (Math.sin(time * 0.07 + i * 0.17) * 0.3 + 0.7) *
              maxBarH * (0.5 + boom);

    const hue = (i / bars) * 360 + hueShift;
    const gradient = ctx.createLinearGradient(0, baseY - h, 0, baseY);
    gradient.addColorStop(0, neonColor(hue, 0.9));
    gradient.addColorStop(0.5, neonColor((hue + 60) % 360, 0.7));
    gradient.addColorStop(1, neonColor((hue + 120) % 360, 0.3));

    ctx.fillStyle = gradient;
    ctx.shadowBlur = 8;
    ctx.shadowColor = neonColor(hue, 0.5);
    ctx.fillRect(i * barWidth + 1, baseY - h, barWidth - 2, h);
  }
  ctx.shadowBlur = 0;
}

// Concentric circles pulse
function drawPulseCircles() {
  const cx = W / 2;
  const cy = H / 2;

  for (let i = 0; i < 15; i++) {
    const phase = ((time * 0.02 + i * 0.15) % 1.5);
    const radius = phase * Math.max(W, H) * 0.4;
    const alpha = Math.max(0, 1 - phase / 1.5);
    const hue = (i * 24 + time * 4 + hueShift) % 360;

    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = neonColor(hue, alpha * 0.6);
    ctx.lineWidth = 3;
    ctx.shadowBlur = 15;
    ctx.shadowColor = neonColor(hue, alpha * 0.4);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
}

// Fractal-like pattern (Mandelbrot-inspired)
function drawFractalPattern() {
  const cx = W / 2;
  const cy = H / 2;
  const numRings = 20;

  for (let ring = 0; ring < numRings; ring++) {
    const baseRadius = 30 + ring * 25;
    const segments = 12 + ring * 2;
    const rotation = time * 0.008 * (ring % 2 === 0 ? 1 : -1);

    ctx.beginPath();
    for (let i = 0; i <= segments; i++) {
      const angle = (i / segments) * Math.PI * 2;
      const wobble = Math.sin(angle * (4 + ring * 0.5) + time * 0.03) * (15 + boom * 20);
      const r = baseRadius + wobble;
      const x = cx + Math.cos(angle + rotation) * r;
      const y = cy + Math.sin(angle + rotation) * r;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();

    const hue = (time * 3 + ring * 18 + hueShift) % 360;
    ctx.strokeStyle = neonColor(hue, 0.5);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// Main render loop
function render() {
  // Fade effect
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.fillRect(0, 0, W, H);

  time++;
  hueShift += 0.5;

  // Boom decay
  boom *= 0.95;

  // Clear fully every few frames to prevent artifacts
  if (time % 120 === 0) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }

  // Draw based on mode
  switch (mode) {
    case 0: // Hybrid - all together
      ctx.save();
      drawStarfield();
      drawSpiral();
      drawTorus();
      drawWaveform();
      drawFakeSpectrum();
      drawPulseCircles();
      ctx.restore();
      break;

    case 1: // Spiral focus
      ctx.save();
      drawSpiral();
      drawGeometry();
      drawPulseCircles();
      ctx.restore();
      break;

    case 2: // Tunnel vision
      ctx.save();
      drawTunnel();
      drawWireframeCubes();
      drawMatrixRain();
      ctx.restore();
      break;

    case 3: // Wave madness
      ctx.save();
      drawWaveform();
      drawFractalPattern();
      drawPulseCircles();
      drawFakeSpectrum();
      ctx.restore();
      break;

    case 4: // 3D showcase
      ctx.save();
      drawTorus();
      drawWireframeCubes();
      drawGeometry();
      drawSpiral();
      ctx.restore();
      break;

    case 5: // Chaos mode
      ctx.save();
      drawSpiral();
      drawTorus();
      drawWaveform();
      drawGeometry();
      drawTunnel();
      drawWireframeCubes();
      drawFakeSpectrum();
      drawPulseCircles();
      drawFractalPattern();
      drawMatrixRain();
      ctx.restore();
      break;
  }

  // Particles overlay
  particles.forEach(p => {
    p.update();
    p.draw();
  });

  // Mouse trail
  drawMouseTrail();

  requestAnimationFrame(render);
}

// Particles
const particles = [];
for (let i = 0; i < 150; i++) {
  particles.push(new Particle());
}

// Mouse trail
const trail = [];
const trailLength = 30;
for (let i = 0; i < trailLength; i++) trail.push({ x: W / 2, y: H / 2 });

function drawMouseTrail() {
  trail.unshift({ x: mouseX, y: mouseY });
  trail.pop();

  for (let i = 1; i < trail.length; i++) {
    const t = i / trail.length;
    const hue = (time * 5 + i * 12 + hueShift) % 360;
    ctx.beginPath();
    ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
    ctx.lineTo(trail[i].x, trail[i].y);
    ctx.strokeStyle = neonColor(hue, t * 0.8);
    ctx.lineWidth = t * 5;
    ctx.shadowBlur = 10;
    ctx.shadowColor = neonColor(hue, 0.5);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
}

// Event listeners
canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('click', () => {
  mode = (mode + 1) % modes;
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    boom = 1;
  }
  if (e.code === 'ArrowLeft') warp = Math.max(0, warp - 0.5);
  if (e.code === 'ArrowRight') warp = Math.min(2, warp + 0.5);
  if (e.code === 'ArrowUp') hueShift += 30;
  if (e.code === 'ArrowDown') hueShift -= 30;
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') warp = 0;
});

// Start
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, W, H);
render();

</script>
</body>
</html>
