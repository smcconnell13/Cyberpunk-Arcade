<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBERFLY // 2087</title>
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    background: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  #gameContainer {
    position: relative;
    width: 400px;
    height: 600px;
    border: 2px solid #ff00ff;
    box-shadow:
      0 0 10px #ff00ff,
      0 0 20px #ff00ff,
      0 0 40px #ff00ff88,
      inset 0 0 10px #ff00ff33;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 400px;
    height: 600px;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  /* Scanline overlay */
  #scanlines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15),
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 10;
  }

  /* CRT vignette */
  #vignette {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: radial-gradient(
      ellipse at center,
      transparent 60%,
      rgba(0, 0, 0, 0.5) 100%
    );
    z-index: 11;
  }

  /* Flicker animation */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.8; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
    97% { opacity: 1; }
  }

  #gameContainer {
    animation: flicker 8s infinite;
  }

  /* Cyberpunk arcade back link */
  #arcade-back-link {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 9999;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: 700;
    color: rgba(0,255,255,0.5);
    text-decoration: none;
    letter-spacing: 0.15em;
    padding: 6px 14px;
    border: 1px solid rgba(0,255,255,0.15);
    border-radius: 3px;
    background: rgba(0,0,20,0.7);
    backdrop-filter: blur(4px);
    transition: all 0.25s ease;
  }
  #arcade-back-link:hover {
    color: #0ff;
    border-color: #0ff;
    text-shadow: 0 0 8px #0ff;
    box-shadow: 0 0 15px rgba(0,255,255,0.3), inset 0 0 15px rgba(0,255,255,0.1);
    background: rgba(0,255,255,0.08);
  }
</style>
</head>
<body>
<a href="arcade.html" id="arcade-back-link"><< BACK TO ARCADE</a>

<div id="gameContainer">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
</div>

<script>
(function() {
// ============================================================
// CYBERFLY // 2087 - A Cyberpunk Flappy Arcade Game
// ============================================================

var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');

// Canvas dimensions
var W = 400;
var H = 600;

// Neon color palette
var COLORS = {
  cyan: '#00ffff',
  magenta: '#ff00ff',
  hotPink: '#ff2d95',
  electricBlue: '#0066ff',
  yellow: '#ffff00',
  green: '#39ff14',
  orange: '#ff6600',
  white: '#ffffff'
};

// Game state
var gameState = 'menu';
var score = 0;
var highScore = 0;
try { highScore = parseInt(localStorage.getItem('cyberflyHighScore')) || 0; } catch(e) {}
var frameCount = 0;
var difficulty = 1;
var screenShake = 0;
var flashAlpha = 0;

// Bird
var bird = {
  x: 80,
  y: H / 2,
  w: 24,
  h: 18,
  vel: 0,
  gravity: 0.45,
  jumpForce: -7.5,
  rotation: 0,
  trail: [],
  glowPulse: 0,
  alive: true
};

// Pipes
var pipes = [];
var PIPE_WIDTH = 52;
var PIPE_GAP = 155;
var PIPE_SPEED = 2.8;
var PIPE_SPAWN_INTERVAL = 95;
var pipeFrameCounter = 0;

// Particles
var particles = [];

// Stars
var stars = [];
for (var si = 0; si < 60; si++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: Math.random() * 2 + 0.5,
    speed: Math.random() * 1.5 + 0.3,
    alpha: Math.random(),
    color: [COLORS.cyan, COLORS.magenta, COLORS.electricBlue][Math.floor(Math.random() * 3)]
  });
}

// Buildings
var buildings = [];
for (var bi = 0; bi < 20; bi++) {
  var bw2 = 20 + Math.random() * 35;
  var bh2 = 40 + Math.random() * 120;
  buildings.push({
    x: bi * 30 - 50,
    w: bw2,
    h: bh2,
    windowRows: Math.floor(bh2 / 15),
    alpha: 0.15 + Math.random() * 0.15
  });
}

function drawBackground() {
  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#05051a');
  grad.addColorStop(0.5, '#0a0a2e');
  grad.addColorStop(1, '#0f0520');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  for (var si2 = 0; si2 < stars.length; si2++) {
    var s = stars[si2];
    s.x -= s.speed;
    if (s.x < -5) s.x = W + 5;
    s.alpha += Math.sin(frameCount * 0.05 + s.x) * 0.02;
    s.alpha = Math.max(0.1, Math.min(1, s.alpha));
    ctx.fillStyle = s.color;
    ctx.globalAlpha = s.alpha * 0.6;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1;

  var horizonY = H * 0.55;
  var GRID_SPACING = 30;
  var GRID_SPEED = 1.5;
  var gridOffsetX = (frameCount * GRID_SPEED) % GRID_SPACING;

  ctx.strokeStyle = COLORS.magenta;
  ctx.lineWidth = 0.5;

  for (var i = 0; i < 15; i++) {
    var t = i / 15;
    var y = horizonY + (H - horizonY) * Math.pow(t, 1.5);
    var alpha = Math.pow(t, 2) * 0.4;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  var vanishX = W / 2;
  for (var i2 = -15; i2 <= 15; i2++) {
    var baseX = vanishX + i2 * GRID_SPACING - gridOffsetX * 0.5;
    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = COLORS.cyan;
    ctx.beginPath();
    ctx.moveTo(vanishX, horizonY);
    ctx.lineTo(baseX + (vanishX - baseX) * 3, H);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  var cityY = H - 2;
  for (var bi2 = 0; bi2 < buildings.length; bi2++) {
    var b = buildings[bi2];
    b.x -= GRID_SPEED * 0.5;
    if (b.x + b.w < -10) {
      b.x = W + Math.random() * 50;
      b.h = 40 + Math.random() * 120;
    }

    ctx.globalAlpha = b.alpha;
    ctx.fillStyle = '#0a0a25';
    ctx.fillRect(b.x, cityY - b.h, b.w, b.h);

    ctx.strokeStyle = COLORS.magenta;
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = b.alpha * 0.6;
    ctx.strokeRect(b.x, cityY - b.h, b.w, b.h);

    ctx.globalAlpha = b.alpha * 0.8;
    var winW = 3;
    var winH = 4;
    var cols = Math.floor((b.w - 6) / 8);
    for (var row = 0; row < b.windowRows; row++) {
      for (var col = 0; col < cols; col++) {
        if (Math.random() > 0.4) {
          var wx = b.x + 4 + col * 8;
          var wy = cityY - b.h + 6 + row * 15;
          ctx.fillStyle = Math.random() > 0.7 ? COLORS.cyan : COLORS.yellow;
          ctx.globalAlpha = b.alpha * (0.3 + Math.random() * 0.4);
          ctx.fillRect(wx, wy, winW, winH);
        }
      }
    }
  }
  ctx.globalAlpha = 1;
}

function drawPipe(pipe) {
  var x = pipe.x;
  var gapTop = pipe.gapY;
  var gapBottom = pipe.gapY + PIPE_GAP;

  var grad = ctx.createLinearGradient(x, 0, x + PIPE_WIDTH, 0);
  grad.addColorStop(0, '#0d0d30');
  grad.addColorStop(0.3, '#1a1a50');
  grad.addColorStop(0.7, '#1a1a50');
  grad.addColorStop(1, '#0d0d30');

  ctx.fillStyle = grad;
  ctx.fillRect(x, 0, PIPE_WIDTH, gapTop);
  ctx.fillRect(x, gapBottom, PIPE_WIDTH, H - gapBottom);

  var capW = PIPE_WIDTH + 12;
  var capH = 16;
  var capX = x - 6;

  var grad2 = ctx.createLinearGradient(capX, 0, capX + capW, 0);
  grad2.addColorStop(0, '#151545');
  grad2.addColorStop(0.5, '#252570');
  grad2.addColorStop(1, '#151545');

  ctx.fillStyle = grad2;
  ctx.fillRect(capX, gapTop - capH, capW, capH);
  ctx.fillRect(capX, gapBottom, capW, capH);

  var glowIntensity = 0.6 + Math.sin(frameCount * 0.08) * 0.3;

  ctx.shadowColor = COLORS.cyan;
  ctx.shadowBlur = 12 * glowIntensity;
  ctx.strokeStyle = COLORS.cyan;
  ctx.lineWidth = 2;
  ctx.globalAlpha = glowIntensity;

  ctx.beginPath(); ctx.moveTo(x, gapTop); ctx.lineTo(x, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + PIPE_WIDTH, gapTop); ctx.lineTo(x + PIPE_WIDTH, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, gapBottom); ctx.lineTo(x, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + PIPE_WIDTH, gapBottom); ctx.lineTo(x + PIPE_WIDTH, H); ctx.stroke();

  ctx.strokeStyle = COLORS.magenta;
  ctx.shadowColor = COLORS.magenta;
  ctx.strokeRect(capX, gapTop - capH, capW, capH);
  ctx.strokeRect(capX, gapBottom, capW, capH);

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  ctx.strokeStyle = COLORS.cyan;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.3 + glowIntensity * 0.3;

  for (var i = 0; i < gapTop - 20; i += 40) {
    var accentY = 15 + i;
    ctx.beginPath();
    ctx.moveTo(x + 4, accentY);
    ctx.lineTo(x + PIPE_WIDTH - 4, accentY);
    ctx.stroke();
    if (i % 80 === 0) {
      ctx.fillStyle = COLORS.magenta;
      ctx.fillRect(x + PIPE_WIDTH - 8, accentY - 2, 4, 4);
    }
  }

  for (var i2 = gapBottom + 20; i2 < H - 10; i2 += 40) {
    ctx.beginPath();
    ctx.moveTo(x + 4, i2);
    ctx.lineTo(x + PIPE_WIDTH - 4, i2);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;

  if (pipe.passed) {
    ctx.globalAlpha = pipe.passFlash || 0;
    ctx.fillStyle = COLORS.green;
    ctx.shadowColor = COLORS.green;
    ctx.shadowBlur = 20;
    ctx.fillRect(x - 4, gapTop - 10, PIPE_WIDTH + 8, PIPE_GAP + 20);
    ctx.shadowBlur = 0;
    pipe.passFlash -= 0.03;
    if (pipe.passFlash < 0) {
      pipe.passed = false;
      pipe.passFlash = 0;
    }
    ctx.globalAlpha = 1;
  }
}

function drawBird() {
  if (!bird.alive && gameState === 'gameover') return;

  var bx = bird.x;
  var by = bird.y;
  bird.glowPulse += 0.15;
  var pulse = Math.sin(bird.glowPulse) * 0.3 + 0.7;

  ctx.save();
  ctx.translate(bx, by);

  var targetRot = Math.min(bird.vel * 0.06, Math.PI / 4);
  bird.rotation += (targetRot - bird.rotation) * 0.15;
  ctx.rotate(bird.rotation);

  ctx.shadowColor = COLORS.cyan;
  ctx.shadowBlur = 15 * pulse;

  ctx.fillStyle = '#0a0a2e';
  ctx.strokeStyle = COLORS.cyan;
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(14, 0);
  ctx.lineTo(-8, -9);
  ctx.lineTo(-4, -5);
  ctx.lineTo(-10, 0);
  ctx.lineTo(-4, 5);
  ctx.lineTo(-8, 9);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.shadowColor = COLORS.magenta;
  ctx.shadowBlur = 8 * pulse;
  ctx.fillStyle = COLORS.magenta;
  ctx.beginPath();
  ctx.moveTo(6, 0);
  ctx.lineTo(1, -3);
  ctx.lineTo(1, 3);
  ctx.closePath();
  ctx.fill();

  var engineLen = 4 + Math.random() * 6 + (bird.vel < 0 ? 8 : 0);
  ctx.shadowColor = COLORS.hotPink;
  ctx.shadowBlur = 12;
  ctx.strokeStyle = COLORS.hotPink;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-10, -2);
  ctx.lineTo(-10 - engineLen, 0);
  ctx.lineTo(-10, 2);
  ctx.stroke();

  ctx.fillStyle = COLORS.cyan;
  ctx.globalAlpha = 0.6 + Math.random() * 0.4;
  ctx.beginPath();
  ctx.arc(-10 - engineLen, 0, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();

  if (gameState === 'playing') {
    bird.trail.push({ x: bx - 10, y: by, alpha: 0.8 });
    if (bird.trail.length > 15) bird.trail.shift();
  }
}

function drawTrail() {
  for (var i = 0; i < bird.trail.length; i++) {
    var t = bird.trail[i];
    t.alpha -= 0.05;
    if (t.alpha > 0) {
      ctx.globalAlpha = t.alpha * 0.4;
      ctx.fillStyle = COLORS.cyan;
      ctx.shadowColor = COLORS.cyan;
      ctx.shadowBlur = 6;
      var size = 2 + (i / bird.trail.length) * 3;
      ctx.fillRect(t.x - size/2, t.y - size/2, size, size);
    }
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  bird.trail = bird.trail.filter(function(t) { return t.alpha > 0; });
}

function drawParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vy += 0.05;
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function spawnExplosion(x, y, count) {
  count = count || 30;
  var colors = [COLORS.cyan, COLORS.magenta, COLORS.hotPink, COLORS.yellow, COLORS.white];
  for (var i = 0; i < count; i++) {
    var angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    var speed = 1.5 + Math.random() * 4;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 1.5 + Math.random() * 3,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

function drawScore() {
  ctx.textAlign = 'center';
  if (gameState === 'playing' || gameState === 'gameover') {
    var scorePulse = 1 + Math.sin(frameCount * 0.1) * 0.05;
    ctx.save();
    ctx.translate(W / 2, 45);
    ctx.scale(scorePulse, scorePulse);
    ctx.font = 'bold 42px "Courier New", monospace';
    ctx.shadowColor = COLORS.cyan;
    ctx.shadowBlur = 15;
    ctx.strokeStyle = COLORS.cyan;
    ctx.lineWidth = 2;
    ctx.strokeText(score.toString(), 0, 0);
    ctx.fillStyle = COLORS.white;
    ctx.fillText(score.toString(), 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawMenu() {
  ctx.textAlign = 'center';
  var titlePulse = Math.sin(frameCount * 0.05) * 0.3 + 0.7;

  ctx.font = 'bold 48px "Courier New", monospace';

  ctx.shadowColor = COLORS.magenta;
  ctx.shadowBlur = 30 * titlePulse;
  ctx.fillStyle = COLORS.magenta;
  ctx.globalAlpha = 0.3;
  ctx.fillText('CYBERFLY', W / 2, H * 0.25);

  ctx.shadowBlur = 15;
  ctx.globalAlpha = 0.6;
  ctx.fillText('CYBERFLY', W / 2, H * 0.25);

  ctx.shadowColor = COLORS.cyan;
  ctx.shadowBlur = 8;
  ctx.globalAlpha = 1;
  ctx.fillStyle = COLORS.white;
  ctx.fillText('CYBERFLY', W / 2, H * 0.25);

  ctx.shadowBlur = 0;

  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.fillStyle = COLORS.cyan;
  ctx.globalAlpha = 0.8;
  ctx.fillText('// 2 0 8 7 //', W / 2, H * 0.25 + 30);

  ctx.globalAlpha = titlePulse;
  ctx.strokeStyle = COLORS.cyan;
  ctx.shadowColor = COLORS.cyan;
  ctx.shadowBlur = 10;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 100, H * 0.25 + 45);
  ctx.lineTo(W / 2 + 100, H * 0.25 + 45);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.globalAlpha = titlePulse;
  ctx.font = 'bold 20px "Courier New", monospace';
  ctx.fillStyle = COLORS.yellow;
  ctx.shadowColor = COLORS.yellow;
  ctx.shadowBlur = 10;
  ctx.fillText('[ CLICK OR SPACE TO START ]', W / 2, H * 0.55);
  ctx.shadowBlur = 0;

  ctx.globalAlpha = 0.7;
  ctx.font = '13px "Courier New", monospace';
  ctx.fillStyle = COLORS.cyan;
  ctx.fillText('NAVIGATE THE FIREWALLS', W / 2, H * 0.65);
  ctx.fillText('AVOID DETECTION NODES', W / 2, H * 0.65 + 22);

  if (highScore > 0) {
    ctx.globalAlpha = 0.6;
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.fillStyle = COLORS.magenta;
    ctx.shadowColor = COLORS.magenta;
    ctx.shadowBlur = 6;
    ctx.fillText('HI-SCORE: ' + highScore, W / 2, H * 0.78);
    ctx.shadowBlur = 0;
  }

  ctx.globalAlpha = 0.3;
  ctx.font = '10px "Courier New", monospace';
  ctx.fillStyle = COLORS.white;
  ctx.fillText('v1.0 // NEON PROTOCOL', W / 2, H - 20);

  ctx.globalAlpha = 1;

  bird.y = H * 0.45 + Math.sin(frameCount * 0.04) * 15;
  bird.vel = Math.cos(frameCount * 0.04) * 2;
  drawBird();
  drawTrail();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(5, 0, 15, 0.7)';
  ctx.fillRect(0, 0, W, H);

  var boxW = 280;
  var boxH = 200;
  var boxX = (W - boxW) / 2;
  var boxY = (H - boxH) / 2 - 30;

  ctx.strokeStyle = COLORS.magenta;
  ctx.shadowColor = COLORS.magenta;
  ctx.shadowBlur = 15;
  ctx.lineWidth = 2;
  ctx.strokeRect(boxX, boxY, boxW, boxH);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(10, 0, 20, 0.85)';
  ctx.fillRect(boxX + 1, boxY + 1, boxW - 2, boxH - 2);

  ctx.textAlign = 'center';

  var glitchX = Math.sin(frameCount * 0.5) > 0.8 ? (Math.random() - 0.5) * 10 : 0;

  ctx.font = 'bold 36px "Courier New", monospace';
  ctx.fillStyle = COLORS.hotPink;
  ctx.shadowColor = COLORS.hotPink;
  ctx.shadowBlur = 12;
  ctx.fillText('SYSTEM', W / 2 + glitchX, boxY + 45);
  ctx.fillText('CRASHED', W / 2 - glitchX, boxY + 80);
  ctx.shadowBlur = 0;

  ctx.font = 'bold 18px "Courier New", monospace';
  ctx.fillStyle = COLORS.cyan;
  ctx.shadowColor = COLORS.cyan;
  ctx.shadowBlur = 6;
  ctx.fillText('SCORE: ' + score, W / 2, boxY + 120);
  ctx.shadowBlur = 0;

  ctx.font = '14px "Courier New", monospace';
  ctx.fillStyle = COLORS.yellow;
  if (score >= highScore && score > 0) {
    ctx.shadowColor = COLORS.yellow;
    ctx.shadowBlur = 8;
    ctx.fillText('>> NEW HI-SCORE <<', W / 2, boxY + 145);
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = COLORS.magenta;
    ctx.fillText('HI: ' + highScore, W / 2, boxY + 145);
  }

  var pulse = Math.sin(frameCount * 0.08) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.font = 'bold 16px "Courier New", monospace';
  ctx.fillStyle = COLORS.green;
  ctx.shadowColor = COLORS.green;
  ctx.shadowBlur = 8;
  ctx.fillText('[ CLICK TO REBOOT ]', W / 2, boxY + boxH - 20);
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  drawParticles();
}

function spawnPipe() {
  var minGap = 60;
  var maxGap = H - PIPE_GAP - 60;
  var gapY = minGap + Math.random() * (maxGap - minGap);
  pipes.push({
    x: W + 10,
    gapY: gapY,
    passed: false,
    passFlash: 0
  });
}

function checkCollision() {
  if (bird.y - bird.h / 2 <= 0 || bird.y + bird.h / 2 >= H) return true;

  var birdLeft = bird.x - bird.w / 2 + 4;
  var birdRight = bird.x + bird.w / 2 - 4;
  var birdTop = bird.y - bird.h / 2 + 3;
  var birdBottom = bird.y + bird.h / 2 - 3;

  for (var i = 0; i < pipes.length; i++) {
    var pipe = pipes[i];
    var pipeLeft = pipe.x;
    var pipeRight = pipe.x + PIPE_WIDTH;

    if (birdRight > pipeLeft && birdLeft < pipeRight) {
      if (birdTop < pipe.gapY || birdBottom > pipe.gapY + PIPE_GAP) {
        return true;
      }
    }
  }
  return false;
}

function resetGame() {
  bird.y = H / 2;
  bird.vel = 0;
  bird.rotation = 0;
  bird.trail = [];
  bird.alive = true;
  pipes = [];
  particles = [];
  score = 0;
  pipeFrameCounter = 40;
  difficulty = 1;
  screenShake = 0;
  flashAlpha = 0;
}

function jump() {
  if (gameState === 'menu') {
    gameState = 'playing';
    resetGame();
    bird.vel = bird.jumpForce;
    return;
  }

  if (gameState === 'gameover') {
    gameState = 'menu';
    screenShake = 0;
    flashAlpha = 0;
    frameCount = 0;
    return;
  }

  if (gameState === 'playing' && bird.alive) {
    bird.vel = bird.jumpForce;
    for (var i = 0; i < 5; i++) {
      particles.push({
        x: bird.x - 12,
        y: bird.y + Math.random() * 8 - 4,
        vx: -1 - Math.random() * 2,
        vy: Math.random() * 2 - 1,
        size: 1 + Math.random() * 2,
        life: 0.6,
        decay: 0.03,
        color: Math.random() > 0.5 ? COLORS.cyan : COLORS.hotPink
      });
    }
  }
}

function update() {
  frameCount++;

  if (gameState !== 'playing') return;

  bird.vel += bird.gravity;
  bird.y += bird.vel;

  pipeFrameCounter++;
  var spawnRate = Math.max(60, PIPE_SPAWN_INTERVAL - difficulty * 3);

  if (pipeFrameCounter >= spawnRate) {
    spawnPipe();
    pipeFrameCounter = 0;
  }

  for (var i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= PIPE_SPEED + difficulty * 0.15;

    if (!pipes[i].passed && pipes[i].x + PIPE_WIDTH < bird.x) {
      pipes[i].passed = true;
      pipes[i].passFlash = 0.8;
      score++;

      if (score % 5 === 0) {
        difficulty++;
      }

      for (var j = 0; j < 10; j++) {
        particles.push({
          x: bird.x + Math.random() * 20,
          y: bird.y - 15,
          vx: Math.random() * 2 - 1,
          vy: -1 - Math.random() * 2,
          size: 1 + Math.random(),
          life: 0.7,
          decay: 0.02,
          color: COLORS.green
        });
      }
    }

    if (pipes[i].x + PIPE_WIDTH < -10) {
      pipes.splice(i, 1);
    }
  }

  if (checkCollision()) {
    bird.alive = false;
    gameState = 'gameover';
    screenShake = 15;
    flashAlpha = 1;

    if (score > highScore) {
      highScore = score;
      try { localStorage.setItem('cyberflyHighScore', highScore.toString()); } catch(e) {}
    }

    spawnExplosion(bird.x, bird.y, 40);
  }

  if (screenShake > 0) screenShake *= 0.85;
  if (flashAlpha > 0) flashAlpha -= 0.05;
}

function render() {
  ctx.save();
  if (screenShake > 0.5) {
    var shakeX = (Math.random() - 0.5) * screenShake;
    var shakeY = (Math.random() - 0.5) * screenShake;
    ctx.translate(shakeX, shakeY);
  }

  ctx.clearRect(-10, -10, W + 20, H + 20);

  drawBackground();

  if (gameState === 'menu') {
    drawMenu();
    drawParticles();
  } else if (gameState === 'playing') {
    for (var i = 0; i < pipes.length; i++) drawPipe(pipes[i]);
    drawTrail();
    drawBird();
    drawParticles();
    drawScore();
    drawBorderLines();
  } else if (gameState === 'gameover') {
    for (var i2 = 0; i2 < pipes.length; i2++) drawPipe(pipes[i2]);
    drawTrail();

    if (flashAlpha > 0) {
      ctx.globalAlpha = flashAlpha * 0.4;
      ctx.fillStyle = COLORS.white;
      ctx.fillRect(-10, -10, W + 20, H + 20);
      ctx.globalAlpha = 1;
    }

    drawScore();
    drawGameOver();
    drawBorderLines();
  }

  ctx.restore();
}

function drawBorderLines() {
  var pulse = Math.sin(frameCount * 0.06) * 0.3 + 0.5;

  ctx.strokeStyle = COLORS.magenta;
  ctx.shadowColor = COLORS.magenta;
  ctx.shadowBlur = 8;
  ctx.lineWidth = 2;
  ctx.globalAlpha = pulse;
  ctx.beginPath();
  ctx.moveTo(0, 3);
  ctx.lineTo(W, 3);
  ctx.stroke();

  ctx.strokeStyle = COLORS.cyan;
  ctx.shadowColor = COLORS.cyan;
  ctx.beginPath();
  ctx.moveTo(0, H - 3);
  ctx.lineTo(W, H - 3);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// =============================================
// INPUT HANDLING
// =============================================

canvas.addEventListener('click', function(e) {
  e.preventDefault();
  jump();
});

document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    jump();
  }
});

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  jump();
});

window.addEventListener('keydown', function(e) {
  if (e.code === 'Space') {
    e.preventDefault();
  }
});

// =============================================
// START
// =============================================

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() {
    console.log('CYBERFLY // 2087 loaded');
    gameLoop();
  });
} else {
  console.log('CYBERFLY // 2087 loaded');
  gameLoop();
}

})();
</script>
